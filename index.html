<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmileSync — Gestion Cabinet Dentaire</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/patients.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/dental.css">
  <link rel="stylesheet" href="css/ordonnances.css">
  <link rel="stylesheet" href="css/misc.css">
</head>

<body>
  <!-- ════════════════════════════════════════════
     LOGIN
════════════════════════════════════════════ -->
  <div id="login-screen">
    <div class="login-glow"></div>
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">S</div>
        <div>
          <div class="login-logo-text">Smile<span style="color:var(--accent)">Sync</span></div>
          <div class="login-logo-sub">Cabinet Dentaire — v2.0</div>
        </div>
      </div>
      <div class="login-title">Bienvenue</div>
      <div class="login-sub">Connectez-vous pour accéder à votre espace</div>
      <div class="form-group">
        <label class="form-label">Identifiant</label>
        <input class="form-input" id="login-user" value="dr.benali" placeholder="Identifiant">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" id="login-pass" type="password" value="••••••••" placeholder="Mot de passe">
      </div>
      <div style="margin-bottom:20px;">
        <div class="form-label" style="margin-bottom:8px;">Profil</div>
        <div class="role-selector">
          <div class="role-btn selected" id="role-dentiste" onclick="selectRole('dentiste')">
            <span class="role-btn-icon">👩‍⚕️</span>
            <div class="role-btn-label">Dentiste</div>
          </div>
          <div class="role-btn" id="role-secretaire" onclick="selectRole('secretaire')">
            <span class="role-btn-icon">👩‍💼</span>
            <div class="role-btn-label">Secrétaire</div>
          </div>
        </div>
      </div>
      <button class="btn-primary" onclick="doLogin()">Connexion →</button>
      <div style="text-align:center;margin-top:14px;font-size:10px;color:var(--text3);">
        Demo: dentiste / secretaire · mot de passe quelconque
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════ -->
  <div id="app">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sb-top">
        <div class="sb-logo">S</div>
        <div class="sb-brand">Smile<span>Sync</span></div>
      </div>
      <div class="sb-nav">
        <button class="nav-item active" data-page="dashboard">
          <span class="nav-icon">⬡</span>
          <span class="nav-label">Tableau de bord</span>
        </button>
        <button class="nav-item" data-page="patients">
          <span class="nav-icon">◎</span>
          <span class="nav-label">Patients</span>
          <span class="nav-badge" id="nb-patients">8</span>
        </button>
        <button class="nav-item" data-page="agenda">
          <span class="nav-icon">▦</span>
          <span class="nav-label">Agenda</span>
        </button>
        <div class="sb-divider"></div>
        <button class="nav-item" data-page="ordonnances" id="nav-ord">
          <span class="nav-icon">≡</span>
          <span class="nav-label">Ordonnances</span>
        </button>
      </div>
      <button class="sb-toggle" onclick="toggleSidebar()">◂</button>
      <div class="sb-user">
        <div class="sb-avatar avatar" id="sb-avatar" style="background:var(--accent);color:#0b0d12;">D</div>
        <div class="sb-user-info">
          <div class="sb-user-name" id="sb-user-name">Dr. Ben Abdallah Rebai</div>
          <div class="sb-user-role" id="sb-user-role">Dentiste</div>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title" id="topbar-title">Tableau de bord</div>
        <div class="topbar-right">
          <div class="topbar-search">
            <span class="ts-icon">⌕</span>
            <input placeholder="Rechercher un patient..." id="global-search" oninput="globalSearch(this.value)">
          </div>
          <button class="theme-toggle" onclick="toggleTheme()" title="Changer le thème">
            <span class="icon" id="theme-icon">☀</span>
          </button>
          <button class="tb-btn" onclick="toggleNotif()" title="Notifications">
            🔔
            <div class="tb-notif-dot"></div>
          </button>
          <button class="tb-btn" onclick="doLogout()" title="Déconnexion">⏻</button>
          <div class="tb-role-badge" id="tb-role-badge" style="background:var(--accent-dim);color:var(--accent);">
            Dentiste</div>
        </div>
      </div>

      <!-- PAGES -->
      <div class="page active" id="page-dashboard" style="overflow-y:auto;"></div>
      <div class="page" id="page-patients" style="overflow-y:auto;"></div>
      <div class="page" id="page-agenda" style="overflow-y:auto;"></div>
      <div class="page" id="page-ordonnances" style="overflow-y:auto;"></div>
    </div>
  </div>

  <!-- NOTIFICATION PANEL -->
  <div class="notif-panel" id="notif-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;">Notifications</div>
      <button class="btn-ghost btn-sm" onclick="toggleNotif()">✕</button>
    </div>
    <div id="notif-list"></div>
  </div>

  <!-- MODALS (injected by JS) -->
  <div id="modal-patient-detail" class="modal-overlay"></div>
  <div id="modal-tooth" class="modal-overlay"></div>
  <div id="modal-appointment" class="modal-overlay"></div>
  <div id="modal-ordonnance" class="modal-overlay"></div>
  <div id="modal-print" class="modal-overlay"></div>
  <div id="modal-patient-form" class="modal-overlay"></div>

  <!-- TOOLTIP -->
  <div id="tooltip"
    style="position:fixed;background:var(--s2);border:1px solid var(--border);border-radius:var(--r1);padding:7px 11px;font-size:11px;color:var(--text);pointer-events:none;z-index:9997;display:none;box-shadow:var(--shadow);">
  </div>
  <div id="toast-container"></div>

  <!-- Main Application Script (ES Module) -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
