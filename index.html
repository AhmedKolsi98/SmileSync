      </div>

      <div style="text-align:center;margin-top:14px;font-size:10px;color:var(--text3);">

    function gtd(n) { const t = gtt(n); if (t === 'molar') return { w: 34, h: 28 }; if (t === 'premolar') return { w: 24, h: 25 }; if (t === 'canine') return { w: 20, h: 28 }; return { w: 18, h: 26 }; }
    function tpath(cx, cy, w, h, t) {
      const hw = w / 2, hh = h / 2;
      if (t === 'molar') return `M${cx - hw + 3},${cy - hh + 7} Q${cx - hw},${cy - hh} ${cx - hw + 5},${cy - hh - 2} Q${cx},${cy - hh - 4} ${cx + hw - 5},${cy - hh - 2} Q${cx + hw},${cy - hh} ${cx + hw - 3},${cy - hh + 7} Q${cx + hw + 2},${cy} ${cx + hw - 2},${cy + hh - 4} Q${cx + hw / 2},${cy + hh + 2} ${cx},${cy + hh + 2} Q${cx - hw / 2},${cy + hh + 2} ${cx - hw + 2},${cy + hh - 4} Q${cx - hw - 2},${cy} ${cx - hw + 3},${cy - hh + 7}Z`;
      if (t === 'premolar') return `M${cx - hw + 2},${cy - hh + 5} Q${cx - hw},${cy - hh} ${cx - hw + 4},${cy - hh - 1} Q${cx},${cy - hh - 3} ${cx + hw - 4},${cy - hh - 1} Q${cx + hw},${cy - hh} ${cx + hw - 2},${cy - hh + 5} Q${cx + hw + 1},${cy} ${cx + hw - 1},${cy + hh - 2} Q${cx + hw / 2},${cy + hh + 1} ${cx},${cy + hh + 1} Q${cx - hw / 2},${cy + hh + 1} ${cx - hw + 1},${cy + hh - 2} Q${cx - hw - 1},${cy} ${cx - hw + 2},${cy - hh + 5}Z`;
      if (t === 'canine') return `M${cx - hw + 2},${cy - hh + 3} Q${cx - hw},${cy - hh} ${cx - hw + 4},${cy - hh - 2} Q${cx},${cy - hh - 7} ${cx + hw - 4},${cy - hh - 2} Q${cx + hw},${cy - hh} ${cx + hw - 2},${cy - hh + 3} L${cx},${cy + hh + 3} L${cx - hw + 2},${cy - hh + 3}Z`;
      return `M${cx - hw + 2},${cy - hh + 2} Q${cx - hw},${cy - hh - 1} ${cx},${cy - hh - 2} Q${cx + hw},${cy - hh - 1} ${cx + hw - 2},${cy - hh + 2} L${cx + hw - 1},${cy + hh} Q${cx},${cy + hh + 2} ${cx - hw + 1},${cy + hh} L${cx - hw + 2},${cy - hh + 2}Z`;
    }
    function svgE(tag, attrs) { const e = document.createElementNS('http://www.w3.org/2000/svg', tag); Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v)); return e; }

    function probeColor(v) {
      if (v <= 3) return { bg: 'rgba(61,255,160,.15)', color: '#3dffa0' };
      if (v <= 5) return { bg: 'rgba(255,184,48,.15)', color: '#ffb830' };
      if (v <= 7) return { bg: 'rgba(255,140,66,.15)', color: '#ff8c42' };
      return { bg: 'rgba(255,77,109,.2)', color: '#ff4d6d' };

    // DENTAL CHART ENGINE
    // ══════════════════════════════════════════════════════════
    const upper = [18, 17, 16, 15, 14, 13, 12, 11, 21, 22, 23, 24, 25, 26, 27, 28];
    const lower = [48, 47, 46, 45, 44, 43, 42, 41, 31, 32, 33, 34, 35, 36, 37, 38];

    function initParoForPatient(pid, teeth) {
      PARO_DATA[pid] = {};
      function rp(base) { return [0, 1, 2].map(() => Math.max(1, Math.min(9, base + Math.round((Math.random() - .5) * 2.5)))); }
      [...upper, ...lower].forEach(n => {
        const st = teeth[n] || 'healthy', abs = st === 'absent', car = st === 'caries', b = car ? 5 : 2;
        PARO_DATA[pid][n] = {
          buccal: abs ? [0, 0, 0] : rp(b), palatal: abs ? [0, 0, 0] : rp(b),
          bop_buccal: abs ? [false, false, false] : [Math.random() > .7, Math.random() > .78, Math.random() > .75],
          bop_palatal: abs ? [false, false, false] : [Math.random() > .72, Math.random() > .82, Math.random() > .8],
          recession: abs ? [0, 0, 0] : [Math.round(Math.random() * 2), Math.round(Math.random() * 1.5), Math.round(Math.random() * 2)],
          mobility: abs ? 0 : car ? 1 : 0,
        };
      });
    }

    function initDentalChart(pid, teeth) {
      const svg = document.getElementById(`dsvg-${pid}`);
      if (!svg || svg.dataset.built) return;
      svg.dataset.built = '1';
      const defaultTeeth = {};[...upper, ...lower].forEach(n => defaultTeeth[n] = 'healthy'); const allTeeth = { ...defaultTeeth, ...teeth };

      function renderArc(arr, yC, isLow) {
        const sX = 10, tS = 700 / 16;
        arr.forEach((num, i) => {
          const cx = sX + (i + .5) * tS, { w, h } = gtd(num), type = gtt(num), st = allTeeth[num] || 'healthy';
          const numY = isLow ? yC + h / 2 + 12 : yC - h / 2 - 4;
          const g = svgE('g', { class: 'tooth-group', 'data-tooth': num, 'data-pid': pid, 'data-status': st });
          if (st === 'crown') { g.appendChild(svgE('path', { d: tpath(cx, yC, w + 5, h + 4, type), fill: 'none', stroke: '#00e5ff', 'stroke-width': '1.5', opacity: '.4' })); }
          if (st === 'bridge' && i > 0 && (allTeeth[arr[i - 1]] || 'healthy') === 'bridge') {
            const pCx = sX + (i - .5) * tS, pw = gtd(arr[i - 1]).w;
            svg.insertBefore(svgE('line', { x1: pCx + pw / 2 - 1, y1: yC, x2: cx - w / 2 + 1, y2: yC, stroke: '#f472b6', 'stroke-width': '2.5', 'stroke-dasharray': '4,2', opacity: '.5' }), g);
          }
          const path = svgE('path', { class: 'tooth-shape', d: tpath(cx, yC, w, h, type), fill: TOOTH_SC[st] || TOOTH_SC.healthy, id: `tf-${pid}-${num}` });
          if (st === 'implant') { g.appendChild(svgE('circle', { cx, cy: yC, r: '4', fill: 'none', stroke: '#ffb830', 'stroke-width': '1.5', 'stroke-dasharray': '3,2' })); }
          const txt = svgE('text', { class: 'tooth-number', x: cx, y: numY }); txt.textContent = num;
          g.appendChild(path); g.appendChild(txt); svg.appendChild(g);
          g.addEventListener('mouseenter', e => showTip(e, `<strong style="color:var(--accent)">${num}</strong> ${TOOTH_NAMES[num] || ''}<br><span style="color:${TOOTH_SC[st]}">${TOOTH_SL[st]}</span>`));
          g.addEventListener('mousemove', moveTip); g.addEventListener('mouseleave', hideTip);
          g.addEventListener('click', () => openToothModal(pid, num, allTeeth));
        });
      }
      renderArc(upper, 56, false);
      renderArc(lower, 148, true);
    }

      fs.appendChild(svgE('path', { d: 'M90,162 Q160,190 280,198 Q350,202 420,198 Q540,190 610,162 Q570,176 490,184 Q420,190 350,192 Q280,190 210,184 Q130,176 90,162Z', fill: '#1a1018', stroke: '#2e1a22', 'stroke-width': '1.2' }));

      const uF = [{ n: 15, cx: 152, cy: 158, w: 22, h: 25, v: .35 }, { n: 14, cx: 180, cy: 156, w: 24, h: 29, v: .6 }, { n: 13, cx: 210, cy: 153, w: 20, h: 33, v: .82 }, { n: 12, cx: 238, cy: 151, w: 18, h: 36, v: .93 }, { n: 11, cx: 263, cy: 150, w: 22, h: 38, v: 1 }, { n: 21, cx: 291, cy: 150, w: 22, h: 38, v: 1 }, { n: 22, cx: 317, cy: 151, w: 18, h: 36, v: .93 }, { n: 23, cx: 345, cy: 153, w: 20, h: 33, v: .82 }, { n: 24, cx: 375, cy: 155, w: 24, h: 30, v: .62 }, { n: 25, cx: 405, cy: 157, w: 22, h: 26, v: .38 }];

          const th = Math.round(h * op * .72 + 7); const ty = cy + (isLow ? 1 : -1);
          const gg = svgE('g', { class: 'tooth-group', 'data-tooth': n, opacity: op });
          gg.appendChild(svgE('ellipse', { cx, cy: ty + th / 2 + 2, rx: w * .36, ry: 3, fill: 'rgba(0,0,0,.35)' }));
          const rx = w * .22;
          const body = svgE('rect', { x: cx - w / 2 + 1, y: ty - th / 2, width: w - 2, height: th, rx, ry: rx * .8, fill: col, id: `tff-${pid}-${n}${isLow ? 'l' : ''}` });
          gg.appendChild(body);
          gg.appendChild(svgE('rect', { x: cx - w / 2 + 3, y: ty - th / 2 + 3, width: w * .27, height: th * .36, rx: '2', fill: 'rgba(255,255,255,.12)' }));
          if (st === 'crown') { gg.appendChild(svgE('rect', { x: cx - w / 2, y: ty - th / 2 - 1, width: w, height: th + 2, rx: rx + 1, ry: rx * .8 + 1, fill: 'none', stroke: '#00e5ff', 'stroke-width': '1.5', opacity: '.65' })); }
          if (st === 'caries') { gg.appendChild(svgE('circle', { cx: cx + 2, cy: ty - th / 2 + 5, r: '3', fill: '#ff4d6d', opacity: '.9' })); }
          if (st === 'devitalized') { gg.appendChild(svgE('line', { x1: cx - 3, y1: ty - th / 2 + 4, x2: cx + 3, y2: ty - th / 2 + 10, stroke: '#9f7aea', 'stroke-width': '1.5' })); gg.appendChild(svgE('line', { x1: cx + 3, y1: ty - th / 2 + 4, x2: cx - 3, y2: ty - th / 2 + 10, stroke: '#9f7aea', 'stroke-width': '1.5' })); }
          const lbl = svgE('text', { x: cx, y: ty + th / 2 - 3, fill: 'rgba(13,15,20,.8)', 'text-anchor': 'middle', 'font-size': '7', 'font-family': 'DM Mono,monospace', 'font-weight': '500' }); lbl.textContent = n;
          gg.appendChild(lbl); g.appendChild(gg);
          gg.addEventListener('mouseenter', e => showTip(e, `<strong style="color:var(--accent)">${n}</strong> ${TOOTH_NAMES[n] || ''}<br><span style="color:${TOOTH_SC[st]}">${TOOTH_SL[st]}</span>`));
          gg.addEventListener('mousemove', moveTip); gg.addEventListener('mouseleave', hideTip);
          gg.addEventListener('click', () => openToothModal(parseInt(pid), n, allT));
        });
        fs.appendChild(g);
      }
      drawFaceTeeth(uF, `fcu-${pid}`, false);
      drawFaceTeeth(lF, `fcl-${pid}`, true);

      function mkT(x, y, t, c = '#3a4060', s = 8) { const tx = svgE('text', { x, y, 'font-family': 'DM Mono,monospace', 'font-size': s, fill: c, 'text-anchor': 'middle' }); tx.textContent = t; fs.appendChild(tx); }
      mkT(350, 22, 'VUE FRONTALE', '#4b5270', 9);
      mkT(185, 230, 'Q2 — SUP. GAUCHE', '#3a4060', 7.5); mkT(415, 230, 'Q1 — SUP. DROIT', '#3a4060', 7.5);
      mkT(185, 245, 'Q3 — INF. GAUCHE', '#3a4060', 7.5); mkT(415, 245, 'Q4 — INF. DROIT', '#3a4060', 7.5);
      fs.appendChild(svgE('line', { x1: '278', y1: '218', x2: '278', y2: '255', stroke: '#252a38', 'stroke-width': '0.7', 'stroke-dasharray': '3,3' }));
      fs.appendChild(svgE('line', { x1: '100', y1: '236', x2: '500', y2: '236', stroke: '#252a38', 'stroke-width': '0.5' }));
    }

    // ── Paro View ──
    function buildParoView(pid) {
      const p = getPatient(parseInt(pid)); if (!p) return;
      if (!PARO_DATA[pid]) initParoForPatient(parseInt(pid), p.teeth);
      const container = document.getElementById(`paro-${pid}`); if (!container) return;
      const allT = { ...Object.fromEntries([...upper, ...lower].map(n => [n, 'healthy'])), ...p.teeth };
      container.innerHTML = '';
      buildParoArcade(pid, upper, false, container, allT);
      const div = document.createElement('div'); div.className = 'paro-divider';
      div.innerHTML = '<div class="paro-div-line"></div><div class="paro-div-label">Sup. / Inf.</div><div class="paro-div-line"></div>';
      container.appendChild(div);
      buildParoArcade(pid, lower, true, container, allT);
      const sum = document.createElement('div'); sum.className = 'paro-summary'; sum.id = `psum-${pid}`;
      container.appendChild(sum); updateParoSum(pid);
    }

    function buildParoArcade(pid, teeth, isLow, container, allT) {
      const cols = teeth.length, labelW = 78;
      const gs = `display:grid;grid-template-columns:${labelW}px repeat(${cols},1fr);align-items:center;`;
      const t = document.createElement('div'); t.className = 'paro-section-title';
      t.innerHTML = `<div class="bar" style="background:${isLow ? 'var(--info)' : 'var(--accent)'}"></div>${isLow ? 'ARCADE INFÉRIEURE' : 'ARCADE SUPÉRIEURE'}`;
      container.appendChild(t);
      function row(lbl, cells, mb = '2px') {
        const r = document.createElement('div'); r.style.cssText = gs + `margin-bottom:${mb};`;
        const l = document.createElement('div'); l.className = 'paro-row-label'; l.textContent = lbl; r.appendChild(l);
        cells.forEach(c => r.appendChild(c)); container.appendChild(r);
      }
      row('', teeth.map(n => { const c = document.createElement('div'); c.className = 'paro-tooth-num-cell'; c.textContent = n; c.style.color = allT[n] === 'absent' ? '#3a3f52' : 'var(--accent)'; c.onclick = () => { openToothModal(pid, n, allT); }; return c; }), '3px');
      const palLbl = isLow ? 'LINGUAL' : 'PALATAL';
      row(`BOP ${palLbl}`, teeth.map(n => makeBopCell(pid, n, 'palatal', allT)));
      row('RÉCESSION', teeth.map(n => makeRecCell(pid, n, allT)));
      row(`SONDAGE ${palLbl}`, teeth.map(n => makeProbeCell(pid, n, 'palatal', allT)), '1px');
      // Graph
      const gr = document.createElement('div'); gr.style.cssText = gs + 'margin:2px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:2px 0;';
      const gl = document.createElement('div'); gl.className = 'paro-row-label'; gl.style.fontSize = '8px'; gl.textContent = 'GRAPH'; gr.appendChild(gl);
      teeth.forEach(n => {
        const c = document.createElement('div'); c.style.cssText = 'display:flex;justify-content:center;align-items:flex-end;height:36px;gap:1px;padding:1px;';
        if (allT[n] === 'absent') { c.innerHTML = '<div style="width:28px;height:1px;background:var(--border);margin:auto 0 0;"></div>'; gr.appendChild(c); return; }
        const pd = PARO_DATA[pid]?.[n]; if (!pd) { gr.appendChild(c); return; }
        [...pd.palatal, ...pd.buccal].forEach((v, vi) => { const pc = probeColor(v); const b = document.createElement('div'); b.className = 'paro-bar'; b.style.cssText = `background:${pc.color};height:${Math.round((v / 9) * 32)}px;opacity:${vi < 3 ? .55 : 1};`; c.appendChild(b); });
        gr.appendChild(c);
      });
      container.appendChild(gr);
      row('SONDAGE BUCCAL', teeth.map(n => makeProbeCell(pid, n, 'buccal', allT)), '1px');
      row('BOP BUCCAL', teeth.map(n => makeBopCell(pid, n, 'bop_buccal', allT)));
      row('MOBILITÉ', teeth.map(n => makeMobCell(pid, n, allT)), '6px');
    }

    function makeBopCell(pid, n, side, allT) {
      const c = document.createElement('div'); c.className = 'bop-cell';
      if (allT[n] === 'absent') { c.innerHTML = '<span style="color:#3a3f52;font-size:9px">—</span>'; return c; }
      const pd = PARO_DATA[pid]?.[n]; if (!pd) { return c; }
      const key = side === 'palatal' ? 'bop_palatal' : 'bop_buccal';
      const arr = pd[key] || [false, false, false];
      arr.forEach((v, i) => {
        const d = document.createElement('div'); d.className = 'bop-dot ' + (v ? 'positive' : 'negative');
        d.onclick = () => { if (PARO_DATA[pid]?.[n]) { PARO_DATA[pid][n][key][i] = !PARO_DATA[pid][n][key][i]; d.className = 'bop-dot ' + (PARO_DATA[pid][n][key][i] ? 'positive' : 'negative'); updateParoSum(pid); } };
        c.appendChild(d);
      }); return c;
    }
    function makeRecCell(pid, n, allT) {
      const c = document.createElement('div'); c.className = 'recession-cell';
      if (allT[n] === 'absent') { c.innerHTML = '<span style="color:#3a3f52;font-size:9px">—</span>'; return c; }
      const pd = PARO_DATA[pid]?.[n]; if (!pd) return c;
      pd.recession.forEach(v => { const d = document.createElement('div'); d.className = 'recession-val'; d.textContent = v; c.appendChild(d); }); return c;
    }
    function makeProbeCell(pid, n, side, allT) {
      const c = document.createElement('div'); c.className = 'paro-probe-cell';
      if (allT[n] === 'absent') { c.innerHTML = '<span style="color:#3a3f52;font-size:9px">—</span>'; return c; }
      const pd = PARO_DATA[pid]?.[n]; if (!pd) return c;
      const arr = pd[side] || [2, 2, 2];
      arr.forEach((v, i) => {
        const pc = probeColor(v); const d = document.createElement('div'); d.className = 'probe-val'; d.textContent = v;
        d.style.cssText = `background:${pc.bg};color:${pc.color};border-color:${pc.color}33;`;
        d.onclick = () => {
          if (d.querySelector('input')) return;
          const inp = document.createElement('input'); inp.type = 'number'; inp.min = 1; inp.max = 9; inp.value = v; inp.className = 'probe-edit';
          d.textContent = ''; d.appendChild(inp); inp.focus(); inp.select();
          const commit = () => { const nv = Math.max(1, Math.min(9, parseInt(inp.value) || v)); if (PARO_DATA[pid]?.[n]) { PARO_DATA[pid][n][side][i] = nv; } const pc2 = probeColor(nv); d.textContent = nv; d.style.cssText = `background:${pc2.bg};color:${pc2.color};border-color:${pc2.color}33;`; updateParoSum(pid); };
          inp.onblur = commit; inp.onkeydown = e => { if (e.key === 'Enter') commit(); };
        };
        c.appendChild(d);
      }); return c;
    }
    function makeMobCell(pid, n, allT) {
      const c = document.createElement('div'); c.className = 'mobility-cell';
      if (allT[n] === 'absent') { c.innerHTML = '<span style="color:#3a3f52;font-size:9px">—</span>'; return c; }
      const pd = PARO_DATA[pid]?.[n]; if (!pd) return c;
      const sel = document.createElement('select'); sel.className = 'mobility-select';
      [0, 1, 2, 3].forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; if (v === (pd.mobility || 0)) o.selected = true; sel.appendChild(o); });
      sel.onchange = e => { if (PARO_DATA[pid]?.[n]) PARO_DATA[pid][n].mobility = parseInt(e.target.value); };
      c.appendChild(sel); return c;
    }
    function updateParoSum(pid) {
      const s = document.getElementById(`psum-${pid}`); if (!s) return;
      let total = 0, bop = 0, deep = 0, mx = 0;
      [...upper, ...lower].forEach(n => {
        const pd = PARO_DATA[pid]?.[n]; if (!pd) return;
        const p = getPatient(parseInt(pid));
        if ((p?.teeth[n] || 'healthy') === 'absent') return;
        [...pd.buccal, ...pd.palatal].forEach(v => { total++; if (v >= 4) deep++; if (v > mx) mx = v; });
        [...(pd.bop_buccal || []), ...(pd.bop_palatal || [])].forEach(b => { if (b) bop++; });
      });
      const bopPct = total > 0 ? Math.round((bop / total) * 100) : 0;
      const bc = bopPct < 15 ? 'var(--accent)' : bopPct < 30 ? 'var(--warn)' : 'var(--danger)';
      const dc = deep < 5 ? 'var(--accent)' : deep < 15 ? 'var(--warn)' : 'var(--danger)';
      s.innerHTML = `<div class="paro-sum-item"><div class="paro-sum-val" style="color:var(--accent)">${total}</div><div class="paro-sum-label">SITES</div></div><div class="paro-sum-item"><div class="paro-sum-val" style="color:${bc}">${bopPct}%</div><div class="paro-sum-label">BOP</div></div><div class="paro-sum-item"><div class="paro-sum-val" style="color:${dc}">${deep}</div><div class="paro-sum-label">POCHES ≥4mm</div></div><div class="paro-sum-item"><div class="paro-sum-val" style="color:var(--danger)">${mx}mm</div><div class="paro-sum-label">MAX</div></div>`;
    }

    // ══════════════════════════════════════════════════════════
    // AGENDA
    // ══════════════════════════════════════════════════════════
    function renderAgenda() {
      const container = $('page-agenda');
      container.innerHTML = '';

      const hdr = el('div', 'page-header');
      hdr.innerHTML = `<div><div class="page-header-title">Agenda</div><div class="page-header-sub">Gestion des rendez-vous</div></div>
  <div style="display:flex;gap:8px;">
    <div class="cal-view-toggle">
      <button class="cal-view-btn ${APP.calView === 'monthly' ? 'active' : ''}" onclick="setCalView('monthly',this)">Mensuelle</button>
      <button class="cal-view-btn ${APP.calView === 'weekly' ? 'active' : ''}" onclick="setCalView('weekly',this)">Hebdomadaire</button>
    </div>
    <button class="btn btn-accent" onclick="openAppointmentModal()">+ Nouveau RDV</button>
  </div>`;
      container.appendChild(hdr);

      const calCard = el('div', 'card');
      // Nav
      const nav = el('div', 'cal-header');
      const mn = el('div', 'cal-nav');
      const prevBtn = el('button', 'btn btn-outline btn-sm'); prevBtn.textContent = '←'; prevBtn.onclick = () => { calNavigate(-1); };
      const nextBtn = el('button', 'btn btn-outline btn-sm'); nextBtn.textContent = '→'; nextBtn.onclick = () => { calNavigate(1); };
      const todayBtn = el('button', 'btn btn-outline btn-sm'); todayBtn.textContent = "Auj."; todayBtn.onclick = () => { APP.calDate = new Date(APP.today); APP.calDate.setDate(1); renderCalBody(calBody); };
      mn.appendChild(prevBtn); mn.appendChild(nextBtn); mn.appendChild(todayBtn);
      const mLabel = el('div', 'cal-month-label', '');
      nav.appendChild(mn); nav.appendChild(mLabel);
      calCard.appendChild(nav);

      const calBody = el('div', '');
      calCard.appendChild(calBody);
      container.appendChild(calCard);

      // Upcoming appointments
      const upCard = el('div', 'card');
      upCard.innerHTML = `<div class="card-title"><div class="card-title-dot"></div>Prochains rendez-vous</div>`;
      const upcoming = APPOINTMENTS.filter(a => a.date >= todayStr() && a.status !== 'cancelled').sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time)).slice(0, 10);
      const tbl = el('div', 'table-wrap');
      tbl.innerHTML = `<table><thead><tr><th>Date & Heure</th><th>Patient</th><th>Type</th><th>Durée</th><th>Statut</th><th>Actions</th></tr></thead><tbody>
  ${upcoming.map(a => `<tr onclick="openAppointmentModal(${JSON.stringify(a).replace(/"/g, '&quot;')})">
    <td>${formatDate(a.date)} <strong>${a.time}</strong></td>
    <td><div style="display:flex;align-items:center;gap:8px;"><div class="avatar avatar-sm" style="background:${avatarColor(getPatient(a.patientId)?.nom || '')};">${initials(getPatient(a.patientId) || { prenom: '?', nom: '?' })}</div>${getPatientName(a.patientId)}</div></td>
    <td><span class="badge ${TYPE_CLASSES[a.type]}">${TYPE_LABELS[a.type]}</span></td>
    <td>${a.duration}min</td>
    <td><span class="badge ${STATUS_COLORS_RDV[a.status]}">${STATUS_LABELS_RDV[a.status]}</span></td>
    <td><button class="btn btn-icon" onclick="event.stopPropagation();openAppointmentModal(${JSON.stringify(a).replace(/"/g, '&quot;')})">✎</button></td>
  </tr>`).join('')}
  </tbody></table>`;
      upCard.appendChild(tbl);
      container.appendChild(upCard);

      renderCalBody(calBody);
    }

    function setCalView(v, btn) {
      APP.calView = v;
      btn.closest('.cal-view-toggle').querySelectorAll('.cal-view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const calBody = $('page-agenda').querySelector('.cal-header+div');
      if (calBody) renderCalBody(calBody);
    }
    function calNavigate(dir) {
      if (APP.calView === 'monthly') { APP.calDate.setMonth(APP.calDate.getMonth() + dir); }
      else { APP.calDate.setDate(APP.calDate.getDate() + dir * 7); }
      const calBody = $('page-agenda').querySelector('.cal-header+div');
      if (calBody) renderCalBody(calBody);
    }

    function renderCalBody(container) {
      container.innerHTML = '';
      const monthNames = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
      // Update label
      const mLabel = $('page-agenda').querySelector('.cal-month-label');
      if (mLabel) mLabel.textContent = APP.calView === 'monthly' ? `${monthNames[APP.calDate.getMonth()]} ${APP.calDate.getFullYear()}` : `Semaine du ${formatDate(getWeekStart())}`;

      if (APP.calView === 'monthly') { renderMonthly(container); }
      else { renderWeekly(container); }
    }

    function renderMonthly(container) {
      const y = APP.calDate.getFullYear(), m = APP.calDate.getMonth();
      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const dayNames = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
      const wrap = el('div', 'cal-monthly');
      const dh = el('div', 'cal-days-header');
      dayNames.forEach(d => { const e = el('div', 'cal-day-name'); e.textContent = d; dh.appendChild(e); });
      wrap.appendChild(dh);
      const grid = el('div', 'cal-grid');
      const startOffset = firstDay;
      const prevDays = new Date(y, m, 0).getDate();
      for (let i = startOffset - 1; i >= 0; i--) {
        const cell = el('div', 'cal-cell other-month');
        cell.innerHTML = `<div class="cal-date">${prevDays - i}</div>`;
        grid.appendChild(cell);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = dateStr === todayStr();
        const cell = el('div', `cal-cell${isToday ? ' today' : ''}`);
        cell.innerHTML = `<div class="cal-date">${d}</div>`;
        const dayAppts = APPOINTMENTS.filter(a => a.date === dateStr).sort((a, b) => a.time.localeCompare(b.time));
        dayAppts.slice(0, 3).forEach(a => {
          const ev = el('div', `cal-event ${TYPE_CLASSES[a.type]}`);
          ev.textContent = `${a.time} ${getPatientName(a.patientId).split(' ')[0]}`;
          ev.addEventListener('click', e => { e.stopPropagation(); openAppointmentModal(a); });
          cell.appendChild(ev);
        });
        if (dayAppts.length > 3) { const m = el('div', ''); m.style.cssText = 'font-size:9px;color:var(--text3);'; m.textContent = `+${dayAppts.length - 3} autres`; cell.appendChild(m); }
        cell.addEventListener('click', () => { APP.calDate = new Date(y, m, d); openAppointmentModal(null); });
        grid.appendChild(cell);
      }
      const remaining = (7 - ((startOffset + daysInMonth) % 7)) % 7;
      for (let d = 1; d <= remaining; d++) {
        const cell = el('div', 'cal-cell other-month');
        cell.innerHTML = `<div class="cal-date">${d}</div>`;
        grid.appendChild(cell);
      }
      wrap.appendChild(grid);
      container.appendChild(wrap);
    }

    function getWeekStart() {
      const d = new Date(APP.calDate);
      const day = d.getDay();
      d.setDate(d.getDate() - day + 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function renderWeekly(container) {
      const ws = new Date(getWeekStart());
      const dayNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
      const wrap = el('div', 'cal-weekly');
      const header = el('div', 'week-header');
      header.appendChild(el('div', ''));
      for (let i = 0; i < 7; i++) {
        const d = new Date(ws); d.setDate(d.getDate() + i);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const isToday = dateStr === todayStr();
        const lbl = el('div', `week-day-label${isToday ? ' today-col' : ''}`);
        lbl.innerHTML = `<div class="wdl-name">${dayNames[i]}</div><div class="wdl-num">${d.getDate()}</div>`;
        header.appendChild(lbl);
      }
      wrap.appendChild(header);
      const body = el('div', 'week-body');
      const timeCol = el('div', 'week-time-col');
      for (let h = 8; h <= 19; h++) { const s = el('div', 'week-time-slot'); s.textContent = `${h}:00`; timeCol.appendChild(s); }
      body.appendChild(timeCol);
      for (let i = 0; i < 7; i++) {
        const d = new Date(ws); d.setDate(d.getDate() + i);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const isToday = dateStr === todayStr();
        const col = el('div', `week-day-col${isToday ? ' today-col' : ''}`);
        for (let h = 0; h < 12; h++) { const s = el('div', 'week-slot'); s.dataset.hour = h + 8; s.dataset.date = dateStr; s.onclick = () => { APP.calDate = d; openAppointmentModal(null, null, `${h + 8}:00`); }; col.appendChild(s); }
        const dayAppts = APPOINTMENTS.filter(a => a.date === dateStr);
        dayAppts.forEach(a => {
          const [ah, am] = a.time.split(':').map(Number);
          const top = ((ah - 8) + am / 60) * 48;
          const height = Math.max(a.duration / 60 * 48, 22);
          const apptEl = el('div', `week-appt ${TYPE_CLASSES[a.type]}`);
          apptEl.style.cssText = `top:${top}px;height:${height}px;`;
          apptEl.innerHTML = `<div style="font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${a.time} ${getPatientName(a.patientId).split(' ')[0]}</div><div style="opacity:.8;font-size:9px;">${TYPE_LABELS[a.type]}</div>`;
          apptEl.addEventListener('click', e => { e.stopPropagation(); openAppointmentModal(a); });
          col.appendChild(apptEl);
        });
        body.appendChild(col);
      }
      wrap.appendChild(body);
      container.appendChild(wrap);
    }

    // ── Appointment Modal ──
    function openAppointmentModal(appt = null, patientId = null, time = null) {
      const modal = $('modal-appointment');
      const isEdit = !!appt;
      const defaultDate = APP.calDate ? `${APP.calDate.getFullYear()}-${String(APP.calDate.getMonth() + 1).padStart(2, '0')}-${String(APP.calDate.getDate()).padStart(2, '0')}` : todayStr();
      modal.innerHTML = `
  <div class="modal modal-md">
    <div class="modal-header">
      <div class="modal-title">${isEdit ? 'Modifier le rendez-vous' : 'Nouveau rendez-vous'}</div>
      <button class="modal-close" onclick="closeModal('modal-appointment')">✕</button>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Patient</label>
        <select class="form-select" id="appt-patient">
          <option value="">— Sélectionner —</option>
          ${PATIENTS.map(p => `<option value="${p.id}" ${(appt?.patientId || patientId) === p.id ? 'selected' : ''}>${p.prenom} ${p.nom}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-select" id="appt-type">
          ${Object.entries(TYPE_LABELS).map(([k, v]) => `<option value="${k}" ${appt?.type === k ? 'selected' : ''}>${v}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row form-row-3">
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="appt-date" value="${appt?.date || defaultDate}"></div>
      <div class="form-group"><label class="form-label">Heure</label><input class="form-input" type="time" id="appt-time" value="${appt?.time || time || '09:00'}"></div>
      <div class="form-group"><label class="form-label">Durée (min)</label>
        <select class="form-select" id="appt-duration">
          ${[15, 30, 45, 60, 90, 120].map(d => `<option ${(appt?.duration || 30) === d ? 'selected' : ''}>${d}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Statut</label>
      <select class="form-select" id="appt-status">
        <option value="confirmed" ${appt?.status === 'confirmed' ? 'selected' : ''}>Confirmé</option>
        <option value="waiting" ${appt?.status === 'waiting' ? 'selected' : ''}>En attente</option>
        <option value="cancelled" ${appt?.status === 'cancelled' ? 'selected' : ''}>Annulé</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:0;"><label class="form-label">Notes</label><textarea class="form-textarea" id="appt-notes">${appt?.notes || ''}</textarea></div>
    <div class="modal-footer">
      ${isEdit ? `<button class="btn btn-danger" style="margin-right:auto" onclick="deleteAppointment(${appt.id})">Supprimer</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal('modal-appointment')">Annuler</button>
      <button class="btn btn-accent" onclick="saveAppointment(${isEdit ? appt.id : 'null'})">${isEdit ? 'Enregistrer' : 'Créer'}</button>
    </div>
  </div>`;
      modal.classList.add('open');
    }

    function saveAppointment(id) {
      const pid = parseInt($('appt-patient').value);
      if (!pid) { toast('Veuillez sélectionner un patient', 'error'); return; }
      const apptData = {
        patientId: pid, date: $('appt-date').value, time: $('appt-time').value,
        type: $('appt-type').value, duration: parseInt($('appt-duration').value),
        status: $('appt-status').value, notes: $('appt-notes').value, dentiste: 'Dr. Benali',
      };
      if (id) { const a = APPOINTMENTS.find(x => x.id === id); if (a) Object.assign(a, apptData); toast('Rendez-vous modifié', 'success'); }
      else { APPOINTMENTS.push({ id: APPOINTMENTS.length + 1, ...apptData }); toast('Rendez-vous créé', 'success'); }
      closeModal('modal-appointment'); renderAgenda(); renderDashboard();
    }

    function deleteAppointment(id) {
      const idx = APPOINTMENTS.findIndex(a => a.id === id);
      if (idx > -1) { APPOINTMENTS.splice(idx, 1); toast('Rendez-vous supprimé', 'info'); }
      closeModal('modal-appointment'); renderAgenda(); renderDashboard();
    }

    // ══════════════════════════════════════════════════════════
    // ORDONNANCES
    // ══════════════════════════════════════════════════════════
    function renderOrdonnances() {
      if (APP.role !== 'dentiste') {
        const container = $('page-ordonnances');
        container.innerHTML = '<div class="empty-state" style="padding:60px 20px;"><div class="empty-state-icon">🔒</div><h3>Accès restreint</h3><p style="margin-top:6px;">Les ordonnances sont réservées au dentiste</p></div>';
        return;
      }
      const container = $('page-ordonnances');
      container.innerHTML = '';
      const hdr = el('div', 'page-header');
      hdr.innerHTML = `<div><div class="page-header-title">Ordonnances <span style="font-size:14px;color:var(--text3);font-weight:400;">(${ORDONNANCES.length})</span></div><div class="page-header-sub">Prescriptions médicales du cabinet</div></div>
  <button class="btn btn-accent" onclick="openOrdonnanceModal()">+ Nouvelle ordonnance</button>`;
      container.appendChild(hdr);

      // Search
      const search = el('div', 'search-bar');
      search.innerHTML = `<span style="color:var(--text3);font-size:14px;">⌕</span><input placeholder="Rechercher par patient...">`;
      container.appendChild(search);

      const grid = el('div', '');
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;';
      const sortedOrds = [...ORDONNANCES].sort((a, b) => b.date.localeCompare(a.date));
      sortedOrds.forEach(o => {
        const p = getPatient(o.patientId);
        const ac = p ? avatarColor(p.nom) : 'var(--accent)';
        const card = el('div', 'ordonnance-card');
        card.innerHTML = `
      <div class="ord-header">
        <div style="display:flex;align-items:center;gap:8px;">
          ${p ? `<div class="avatar avatar-sm" style="background:${ac};color:#0b0d12;">${initials(p)}</div>` : ''}
          <div class="ord-patient">${p ? `${p.prenom} ${p.nom}` : 'Patient inconnu'}</div>
        </div>
        <div class="ord-date">${o.date}</div>
      </div>
      <div class="ord-meds">${o.medicaments.map(m => `<div class="ord-med"><strong>${m.nom}</strong> — ${m.posologie}</div>`).join('')}</div>
      ${o.notes ? `<div style="font-size:10px;color:var(--text3);margin-top:6px;font-style:italic;">📝 ${o.notes}</div>` : ''}
      <div class="ord-footer">
        <span class="badge badge-blue">${o.medicaments.length} médicament${o.medicaments.length > 1 ? 's' : ''}</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();printOrdonnance(${o.id})">🖨 Imprimer</button>
          <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openOrdDetail(${o.id})">Voir</button>
        </div>
      </div>`;
        grid.appendChild(card);
      });
      container.appendChild(grid);
    }

    function openOrdonnanceModal(patientId = null) {
      if (APP.role !== 'dentiste') { toast('Accès réservé au dentiste', 'error'); return; }
      const modal = $('modal-ordonnance');
      modal.innerHTML = `
  <div class="modal modal-md">
    <div class="modal-header">
      <div class="modal-title">Nouvelle ordonnance</div>
      <button class="modal-close" onclick="closeModal('modal-ordonnance')">✕</button>
    </div>
    <div class="form-row form-row-2" style="margin-bottom:14px;">
      <div class="form-group"><label class="form-label">Patient</label>
        <select class="form-select" id="ord-patient">
          <option value="">— Sélectionner —</option>
          ${PATIENTS.map(p => `<option value="${p.id}" ${patientId === p.id ? 'selected' : ''}>${p.prenom} ${p.nom}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="ord-date" value="${todayStr()}"></div>
    </div>
    <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Médicaments</div>
    <div id="drugs-list"></div>
    <button class="btn btn-outline btn-sm" onclick="addDrugRow()" style="margin-bottom:14px;">+ Ajouter un médicament</button>
    <div class="form-group"><label class="form-label">Notes / Instructions</label><textarea class="form-textarea" id="ord-notes" placeholder="Instructions au patient..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-ordonnance')">Annuler</button>
      <button class="btn btn-accent" onclick="saveOrdonnance()">Créer l'ordonnance</button>
    </div>
  </div>`;
      modal.classList.add('open');
      addDrugRow();
    }

    function addDrugRow() {
      const list = $('drugs-list');
      const row = document.createElement('div'); row.className = 'drug-row';
      row.innerHTML = `
    <input class="form-input drug-name" placeholder="Médicament (ex: Amoxicilline 1g)">
    <input class="form-input drug-posologie" style="width:160px;" placeholder="Posologie">
    <input class="form-input drug-duree" style="width:90px;" placeholder="Durée">
    <button class="drug-remove" onclick="this.closest('.drug-row').remove()">✕</button>`;
      list.appendChild(row);
    }

    function saveOrdonnance() {
      const pid = parseInt($('ord-patient').value);
      if (!pid) { toast('Veuillez sélectionner un patient', 'error'); return; }
      const meds = [...document.querySelectorAll('.drug-row')].map(r => ({
        nom: r.querySelector('.drug-name').value.trim(),
        posologie: r.querySelector('.drug-posologie').value.trim(),
        duree: r.querySelector('.drug-duree').value.trim(),
        quantite: '',
      })).filter(m => m.nom);
      if (!meds.length) { toast('Ajoutez au moins un médicament', 'error'); return; }
      const newOrd = { id: ORDONNANCES.length + 1, patientId: pid, date: $('ord-date').value, medicaments: meds, notes: $('ord-notes').value, dentiste: 'Dr. Benali' };
      ORDONNANCES.push(newOrd);
      closeModal('modal-ordonnance');
      renderOrdonnances();
      toast('Ordonnance créée', 'success');
      setTimeout(() => printOrdonnance(newOrd.id), 300);
    }

    function openOrdDetail(id) {
      const o = ORDONNANCES.find(x => x.id === id); if (!o) return;
      const p = getPatient(o.patientId);
      const modal = $('modal-ordonnance');
      modal.innerHTML = `
  <div class="modal modal-md">
    <div class="modal-header">
      <div class="modal-title">Ordonnance #${o.id}</div>
      <button class="modal-close" onclick="closeModal('modal-ordonnance')">✕</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:var(--s2);border-radius:var(--r1);">
      ${p ? `<div class="avatar avatar-md" style="background:${avatarColor(p.nom)};color:#0b0d12;">${initials(p)}</div>` : ''}
      <div><div style="font-family:'Syne';font-weight:700;">${p ? `${p.prenom} ${p.nom}` : 'Patient inconnu'}</div><div style="font-size:11px;color:var(--text2);">${o.date} · ${o.dentiste}</div></div>
    </div>
    <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Prescriptions</div>
    ${o.medicaments.map((m, i) => `<div style="padding:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r1);margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;"><strong>${m.nom}</strong><span class="badge badge-gray">${m.duree}</span></div>
      <div style="font-size:11px;color:var(--text2);margin-top:3px;">📋 ${m.posologie}</div>
      ${m.quantite ? `<div style="font-size:10px;color:var(--text3);margin-top:2px;">Qté: ${m.quantite}</div>` : ''}
    </div>`).join('')}
    ${o.notes ? `<div style="margin-top:10px;padding:10px;background:rgba(255,184,48,.06);border:1px solid rgba(255,184,48,.15);border-radius:var(--r1);font-size:11px;color:var(--warn);">📝 ${o.notes}</div>` : ''}
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-ordonnance')">Fermer</button>
      <button class="btn btn-accent" onclick="printOrdonnance(${o.id})">🖨 Imprimer</button>
    </div>
  </div>`;
      modal.classList.add('open');
    }

    function printOrdonnance(id) {
      const o = ORDONNANCES.find(x => x.id === id); if (!o) return;
      const p = getPatient(o.patientId);
      const modal = $('modal-print');
      modal.innerHTML = `
  <div class="modal modal-md" style="padding:0;overflow:hidden;">
    <div style="padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);">
      <div style="font-family:'Syne';font-weight:700;">Aperçu impression</div>
      <button class="modal-close" onclick="closeModal('modal-print')">✕</button>
    </div>
    <div style="padding:20px;">
    <div class="print-preview" id="print-content">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #1a1a2e;">
        <div>
          <h1 style="font-family:'Syne',sans-serif;font-size:22px;margin-bottom:2px;">SmileSync</h1>
          <div style="color:#666;font-size:12px;">Cabinet Dentaire</div>
          <div style="color:#666;font-size:11px;margin-top:4px;">Dr. Benali · RPPS: 12345678901</div>
          <div style="color:#666;font-size:11px;">123 Avenue Habib Bourguiba, Tunis</div>
          <div style="color:#666;font-size:11px;">Tél: +216 71 234 567</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:13px;font-weight:600;">ORDONNANCE</div>
          <div style="color:#666;font-size:11px;">N° ${o.id} — ${o.date}</div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:11px;color:#666;margin-bottom:2px;">PATIENT</div>
        <div style="font-size:14px;font-weight:600;">${p ? `${p.prenom} ${p.nom}` : 'Patient inconnu'}</div>
        <div style="font-size:11px;color:#666;">${p ? ('Né(e) le ' + p.dob) : ''}</div>
      </div>
      <ul class="print-meds">
        ${o.medicaments.map((m, i) => `<li style="padding:10px 0;border-bottom:1px solid #eee;">
          <div style="font-weight:600;font-size:13px;">Rp ${i + 1} — ${m.nom}</div>
          <div style="color:#444;margin-top:3px;font-size:12px;">Sig: ${m.posologie}</div>
          <div style="color:#666;font-size:11px;margin-top:2px;">Durée: ${m.duree}${m.quantite ? ' · Qté: ' + m.quantite : ''}</div>
        </li>`).join('')}
      </ul>
      ${o.notes ? `<div style="margin-top:14px;padding:10px;background:#fafafa;border:1px solid #eee;border-radius:6px;font-size:11px;color:#555;">Note: ${o.notes}</div>` : ''}
      <div style="margin-top:30px;display:flex;justify-content:flex-end;">
        <div style="text-align:center;">
          <div style="width:120px;height:1px;background:#1a1a2e;margin:0 auto 6px;"></div>
          <div style="font-size:11px;color:#666;">Signature & Cachet</div>
          <div style="font-size:11px;font-weight:600;">Dr. Benali</div>
        </div>
      </div>
      <div style="text-align:center;margin-top:16px;font-size:9px;color:#aaa;">Document généré le ${new Date().toLocaleDateString('fr-FR')} — SmileSync v2.0</div>
    </div>
    </div>
    <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-outline" onclick="closeModal('modal-print')">Fermer</button>
      <button class="btn btn-accent" onclick="window.print()">🖨 Imprimer</button>
    </div>
  </div>`;
      modal.classList.add('open');
    }

    // ══════════════════════════════════════════════════════════
    // NOTIFICATIONS
    // ══════════════════════════════════════════════════════════
    function renderNotifications() {
      const list = $('notif-list'); list.innerHTML = '';
      NOTIFICATIONS.forEach(n => {
        const item = el('div', 'notif-item');
        item.innerHTML = `<div style="display:flex;align-items:flex-start;gap:8px;"><span style="font-size:16px;">${n.icon}</span><div><div class="notif-title">${n.title}</div><div class="notif-sub">${n.sub}</div></div></div>`;
        list.appendChild(item);
      });
    }

    // ══════════════════════════════════════════════════════════
    // MODAL HELPERS
    // ══════════════════════════════════════════════════════════
    function closeModal(id) { $(id).classList.remove('open'); }
    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
    });

    // ══════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════
    // Init dental chart on tab click for patient 1 (example)
    document.addEventListener('DOMContentLoaded', () => {
      // Will be rendered on login
    });

    // After render, init chart for currently visible ones
    function postRenderCharts() {
      PATIENTS.forEach(p => {
        const svg = document.getElementById(`dsvg-${p.id}`);
        if (svg && !svg.dataset.built) {
          const container = svg.closest('.view-container');
          if (container && container.classList.contains('active')) { initDentalChart(p.id, p.teeth); }
        }
      });
    }

    // keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
        $('notif-panel').classList.remove('open');
      }
    });


    // Print styles
    const printStyles = document.createElement('style');
    printStyles.textContent = `@media print{body>*:not(#modal-print){display:none!important;}.modal-overlay{position:static!important;background:none!important;}.modal{box-shadow:none!important;border:none!important;}.print-preview{padding:0!important;}}`;
    document.head.appendChild(printStyles);
  </script>
</body>

</html>
