<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmileSync v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--tr:all .2s cubic-bezier(.4,0,.2,1);}
[data-theme="dark"]{
  --bg:#0b0d12;--s1:#111318;--s2:#161a23;--s3:#1c2030;--s4:#232840;
  --bd:#22273a;--bd2:#2d3448;
  --tx:#dde3f0;--tx2:#8892aa;--tx3:#4a5268;
  --acc:#3dffa0;--acc-d:rgba(61,255,160,.1);--acc-g:rgba(61,255,160,.22);
  --cy:#00e5ff;--cy-d:rgba(0,229,255,.1);
  --dng:#ff4d6d;--wa:#ffb830;--inf:#4d9fff;--pu:#9f7aea;--pk:#f472b6;
  --sh:0 4px 24px rgba(0,0,0,.5);--sh2:0 10px 50px rgba(0,0,0,.7);
  --tooth-s:#1a1e2a;--tooth-r:rgba(61,255,160,.55);--tooth-ri:rgba(61,255,160,.25);
}
[data-theme="light"]{
  --bg:#eef1f8;--s1:#ffffff;--s2:#f3f5fc;--s3:#e9ecf7;--s4:#dfe4f5;
  --bd:#cdd3e8;--bd2:#b7bfd8;
  --tx:#1a2038;--tx2:#4a5572;--tx3:#8898b8;
  --acc:#009e60;--acc-d:rgba(0,158,96,.1);--acc-g:rgba(0,158,96,.2);
  --cy:#0077bb;--cy-d:rgba(0,119,187,.1);
  --dng:#e82448;--wa:#d87a00;--inf:#1a72cc;--pu:#6b44cc;--pk:#c43480;
  --sh:0 4px 20px rgba(30,50,100,.08);--sh2:0 10px 40px rgba(30,50,100,.14);
  --tooth-s:#e0e4f2;--tooth-r:rgba(0,158,96,.5);--tooth-ri:rgba(0,158,96,.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.5;transition:background .22s,color .22s;}
input,select,textarea,button{font-family:inherit;font-size:inherit;}
button{cursor:pointer;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* ── LOGIN ── */
#ls{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.lg{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:600px;height:600px;background:radial-gradient(circle,var(--acc-g) 0%,transparent 65%);pointer-events:none;}
.lc{background:var(--s1);border:1px solid var(--bd);border-radius:24px;padding:44px;width:420px;box-shadow:var(--sh2);position:relative;z-index:1;animation:fUp .5s ease;}
@keyframes fUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
.lm{width:44px;height:44px;background:var(--acc);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:#0b0d12;flex-shrink:0;}
.lb{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;}
.lb span{color:var(--acc);}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ro{padding:13px 8px;border-radius:11px;border:2px solid var(--bd);background:var(--s2);color:var(--text2);text-align:center;cursor:pointer;transition:var(--tr);}
.ro:hover{border-color:var(--acc);}
.ro.sel{border-color:var(--acc);background:var(--acc-d);color:var(--acc);}

/* ── APP ── */
#app{display:flex;height:100vh;opacity:0;transition:opacity .4s;}
#app.vis{opacity:1;}
.sb{width:218px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s;overflow:hidden;}
.sb.col{width:62px;}
.sb-top{padding:16px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.sb-mk{width:30px;height:30px;background:var(--acc);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#0b0d12;}
.sb-br{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;white-space:nowrap;}
.sb-br span{color:var(--acc);}
.sb-nav{flex:1;padding:9px 7px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;cursor:pointer;transition:var(--tr);color:var(--text2);white-space:nowrap;overflow:hidden;border:none;background:transparent;width:100%;text-align:left;}
.ni:hover{background:var(--s3);color:var(--text);}
.ni.act{background:var(--acc-d);color:var(--acc);}
.ni-ic{font-size:14px;flex-shrink:0;width:18px;text-align:center;}
.ni-lb{font-size:12px;font-weight:500;}
.ni-bd{margin-left:auto;background:var(--dng);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;flex-shrink:0;min-width:16px;text-align:center;}
.ni-bd.pl{animation:pulse .9s ease infinite alternate;}
@keyframes pulse{from{opacity:.6;transform:scale(.9);}to{opacity:1;transform:scale(1.1);}}
.sd{height:1px;background:var(--bd);margin:5px 7px;}
.sb-usr{padding:10px 9px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sb-tg{padding:5px 9px;display:flex;justify-content:flex-end;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;width:100%;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tb{height:54px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 18px;gap:9px;flex-shrink:0;}
.tb-ti{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:7px;}
.tb-sr{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:6px 12px;width:190px;transition:var(--tr);}
.tb-sr:focus-within{border-color:var(--acc);width:250px;}
.tb-sr input{background:transparent;border:none;outline:none;color:var(--text);flex:1;font-size:11px;}
.tb-sr input::placeholder{color:var(--text3);}
.tb-bt{width:32px;height:32px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:var(--tr);font-size:13px;position:relative;}
.tb-bt:hover{background:var(--s2);color:var(--text);}
.nd{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--dng);border:1.5px solid var(--s1);}
.tb-rl{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}

/* ── PAGES ── */
.page{display:none;flex:1;overflow-y:auto;padding:22px 24px;flex-direction:column;gap:16px;}
.page.act{display:flex;}

/* ── COMPONENTS ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px;}
.ct{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.ctd{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);flex-shrink:0;}
.ph{display:flex;align-items:center;justify-content:space-between;}
.ph-t{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;}
.ph-s{font-size:11px;color:var(--text3);margin-top:2px;}
.kpi-g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:15px;}
.kpi-v{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;line-height:1;}
.kpi-l{font-size:10px;color:var(--text2);margin-top:4px;letter-spacing:.05em;text-transform:uppercase;}
.kpi-b{height:2px;border-radius:1px;margin-top:8px;background:var(--bd);}
.kpi-bf{height:100%;border-radius:1px;transition:width .8s ease;}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;border:1px solid transparent;transition:var(--tr);display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-family:'DM Mono',monospace;}
.btn-a{background:var(--acc);color:#0b0d12;border-color:var(--acc);}
.btn-a:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-o{background:transparent;border-color:var(--bd);color:var(--text2);}
.btn-o:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-d);}
.btn-d{background:transparent;border-color:var(--dng);color:var(--dng);}
.btn-d:hover{background:rgba(255,77,109,.08);}
.btn-g{background:transparent;border:1px solid transparent;color:var(--text2);}
.btn-g:hover{background:var(--s3);color:var(--text);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-xs{padding:3px 7px;font-size:10px;}
.badge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
.b-g{background:rgba(61,255,160,.12);color:var(--acc);}
.b-r{background:rgba(255,77,109,.12);color:var(--dng);}
.b-y{background:rgba(255,184,48,.12);color:var(--wa);}
.b-b{background:rgba(77,159,255,.12);color:var(--inf);}
.b-p{background:rgba(159,122,234,.12);color:var(--pu);}
.b-k{background:var(--s3);color:var(--text2);}
.b-pk{background:rgba(244,114,182,.12);color:var(--pk);}
.b-c{background:rgba(0,229,255,.12);color:var(--cyan);}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:8px 11px;text-align:left;border-bottom:1px solid var(--bd);font-weight:500;}
td{padding:9px 11px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--text2);}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--s2);color:var(--text);}
tbody tr{transition:background .12s;cursor:pointer;}
.fr{display:grid;gap:10px;margin-bottom:11px;}
.fr1{grid-template-columns:1fr;}
.fr2{grid-template-columns:1fr 1fr;}
.fr3{grid-template-columns:1fr 1fr 1fr;}
.fr4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;}
.fi,.fs,.fta{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;color:var(--text);outline:none;transition:var(--tr);width:100%;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-d);}
.fs{appearance:none;cursor:pointer;}
.fta{resize:vertical;min-height:68px;}
.fi::placeholder,.fta::placeholder{color:var(--text3);}
.tabs{display:flex;gap:2px;background:var(--s2);border-radius:9px;padding:3px;margin-bottom:14px;border:1px solid var(--bd);}
.tab{flex:1;padding:6px 8px;border-radius:6px;font-size:11px;color:var(--text2);cursor:pointer;transition:var(--tr);text-align:center;border:none;background:transparent;font-family:'DM Mono',monospace;}
.tab.act{background:var(--s1);color:var(--text);box-shadow:var(--sh);}
.tc{display:none;}
.tc.act{display:block;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;animation:fI .15s ease;}
.ov.open{display:flex;}
@keyframes fI{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:24px;max-height:92vh;overflow-y:auto;animation:sI .2s ease;box-shadow:var(--sh2);}
@keyframes sI{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
.m-sm{width:440px;}.m-md{width:600px;}.m-lg{width:790px;}.m-xl{width:min(1020px,96vw);}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.mt{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
.mc{background:transparent;border:none;color:var(--text3);font-size:19px;cursor:pointer;padding:3px 5px;border-radius:5px;transition:var(--tr);line-height:1;}
.mc:hover{color:var(--text);background:var(--s3);}
.mf{display:flex;justify-content:flex-end;gap:7px;margin-top:18px;padding-top:13px;border-top:1px solid var(--bd);}
.dv{height:1px;background:var(--bd);margin:13px 0;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0;}
.av-s{width:26px;height:26px;font-size:9px;color:#0b0d12;}
.av-m{width:34px;height:34px;font-size:12px;color:#0b0d12;}
.av-l{width:46px;height:46px;font-size:15px;color:#0b0d12;}
.av-xl{width:60px;height:60px;font-size:20px;color:#0b0d12;}
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;box-shadow:var(--sh);min-width:260px;font-size:12px;animation:tIn .25s ease;}
.toast.out{animation:tOut .25s ease forwards;}
@keyframes tIn{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:none;}}
@keyframes tOut{to{opacity:0;transform:translateX(14px);}}
.t-ok{border-left:3px solid var(--acc);}
.t-er{border-left:3px solid var(--dng);}
.t-in{border-left:3px solid var(--inf);}
.t-wa{border-left:3px solid var(--wa);}
#tip{position:fixed;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--text);pointer-events:none;z-index:9997;display:none;box-shadow:var(--sh);}

/* ── CALENDAR ── */
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cdn{text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:5px 0;}
.cday{min-height:78px;background:var(--s2);border-radius:7px;padding:5px;cursor:pointer;transition:var(--tr);border:1px solid transparent;}
.cday:hover{background:var(--s3);border-color:var(--bd);}
.cday.tod{border-color:var(--acc)!important;background:var(--acc-d)!important;}
.cday.om{opacity:.4;}
.cday-n{font-size:11px;font-weight:600;font-family:'Syne',sans-serif;margin-bottom:3px;}
.cday.tod .cday-n{color:var(--acc);}
.cev{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.wk-hdr{display:grid;grid-template-columns:52px repeat(7,1fr);}
.wk-dh{text-align:center;padding:7px 3px;border-left:1px solid var(--bd);}
.wk-body{display:grid;grid-template-columns:52px repeat(7,1fr);overflow-y:auto;max-height:520px;}
.wk-tc{display:flex;flex-direction:column;}
.wk-ts{height:48px;font-size:9px;color:var(--text3);text-align:right;padding-right:6px;padding-top:2px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.wk-dc{border-left:1px solid var(--bd);position:relative;min-height:576px;}
.wk-dc.tod{background:rgba(61,255,160,.016);}
.wk-sl{height:48px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s;}
.wk-sl:hover{background:var(--acc-d);}
.wk-ap{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 5px;font-size:9px;cursor:pointer;border-left:3px solid transparent;overflow:hidden;}
.wk-ap:hover{filter:brightness(1.08);}
.tc-ck{background:rgba(61,255,160,.15);border-color:var(--acc);color:var(--acc);}
.tc-ca{background:rgba(255,77,109,.12);border-color:var(--dng);color:var(--dng);}
.tc-de{background:rgba(0,229,255,.12);border-color:var(--cyan);color:var(--cyan);}
.tc-ex{background:rgba(255,184,48,.12);border-color:var(--wa);color:var(--wa);}
.tc-im{background:rgba(77,159,255,.12);border-color:var(--inf);color:var(--inf);}
.tc-or{background:rgba(159,122,234,.12);border-color:var(--pu);color:var(--pu);}
.tc-pr{background:rgba(244,114,182,.12);border-color:var(--pk);color:var(--pk);}

/* ── WAITING ROOM ── */
.wr-c{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:14px;display:flex;align-items:center;gap:12px;transition:var(--tr);margin-bottom:8px;}
.wr-c.urg{border-color:var(--dng);background:rgba(255,77,109,.04);}
.wr-c.cal{border-left:3px solid var(--acc);opacity:.6;}
.wr-c:hover{border-color:var(--bd2);}

/* ── FILES ── */
.file-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:9px;}
.file-c{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:11px 9px;cursor:pointer;transition:var(--tr);text-align:center;}
.file-c:hover{border-color:var(--bd2);background:var(--s3);}
.upz{border:2px dashed var(--bd);border-radius:11px;padding:24px;text-align:center;cursor:pointer;transition:var(--tr);color:var(--text3);}
.upz:hover,.upz.drag{border-color:var(--acc);color:var(--acc);background:var(--acc-d);}

/* ── CAISSE ── */
.tx-r{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--bd);}
.tx-r:last-child{border-bottom:none;}
.tx-amt{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}

/* ── ORDONNANCES ── */
.ord-c{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:14px;cursor:pointer;transition:var(--tr);}
.ord-c:hover{border-color:var(--bd2);transform:translateY(-1px);}
.drg{display:grid;grid-template-columns:2fr 2fr 1fr auto;gap:7px;align-items:center;padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;margin-bottom:6px;}
.med-ps{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:11px;}
.med-p{padding:7px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;cursor:pointer;transition:var(--tr);font-size:10px;}
.med-p:hover{border-color:var(--acc);background:var(--acc-d);}

/* ── TIMELINE ── */
.tl-i{display:flex;gap:11px;padding-bottom:12px;position:relative;}
.tl-i::before{content:'';position:absolute;left:13px;top:24px;bottom:0;width:1px;background:var(--bd);}
.tl-i:last-child::before{display:none;}
.tl-d{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;z-index:1;}
.tl-b{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:9px;}

/* ── PARO ── */
.pr-v{width:16px;height:18px;border-radius:3px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:500;border:1px solid transparent;cursor:pointer;}
.pr-v:hover{filter:brightness(1.1);}
.bp-d{width:9px;height:9px;border-radius:50%;border:1px solid var(--bd);cursor:pointer;transition:background .12s;}
.bp-d.pos{background:var(--dng);border-color:var(--dng);}

/* ── NOTIF PANEL ── */
.np{position:fixed;top:54px;right:0;width:300px;background:var(--s1);border-left:1px solid var(--bd);height:calc(100vh - 54px);overflow-y:auto;z-index:500;transform:translateX(100%);transition:transform .3s;padding:13px;}
.np.open{transform:none;}

/* ── PATIENT CARDS ── */
.pt-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:11px;}
.pt-c{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:15px;cursor:pointer;transition:var(--tr);}
.pt-c:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--sh);}

/* ── TOOTH SVG ── */
.tooth-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;user-select:none;}
.tooth-wrap.upper{flex-direction:column-reverse;}
.tooth-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);text-align:center;line-height:1;}
.tooth-svg{transition:filter .18s,transform .18s;transform-origin:center;}
.tooth-wrap:hover .tooth-svg{transform:scale(1.16);filter:drop-shadow(0 2px 8px var(--tooth-ri));}
.tooth-wrap.absent .tooth-svg{opacity:.16;}
.arch-row{display:flex;gap:1px;justify-content:center;align-items:flex-end;}
.arch-row.lower{align-items:flex-start;}

function toothType(n) { const d=n%10; if(d===8)return'wisdom'; if(d>=6)return'molar'; if(d>=4)return'premolar'; if(d===3)return'canine'; return'incisor'; }

function toothSVG(num, status, sz) {
  const t = toothType(num);
  const fill = TOOTH_C[status]||TOOTH_C.healthy;
  const absent = status==='absent';
  const op = absent ? 0.15 : 1;
  const stk = DK ? '#1a1e2a' : '#c8d2e8';
  const rc = absent ? (DK?'rgba(180,185,210,.2)':'rgba(150,160,190,.2)') : (DK?'rgba(61,255,160,.55)':'rgba(0,158,96,.5)');
  let vb, W, H, body, roots='', dets='', xtr='';

  if(t==='molar'||t==='wisdom') {
    vb='0 0 50 72'; W=sz||40; H=Math.round((W/50)*72);
    body='M7 8 Q4 8 4 14 L4 20 Q2 24 3 32 Q4 42 8 48 Q14 54 25 54 Q36 54 42 48 Q46 42 47 32 Q48 24 46 20 L46 14 Q46 8 43 8 Q40 4 35 4 Q30 2 25 2 Q20 2 15 4 Q10 4 7 8 Z';
    dets=`<path d="M10 14 Q14 10 18 12 M22 10 Q25 6 28 10 M32 12 Q36 10 40 14" fill="none" stroke="${stk}" stroke-width="1" opacity="0.6"/><ellipse cx="25" cy="24" rx="8" ry="5" fill="${stk}" opacity="${DK?'0.15':'0.1'}"/>`;
    roots=`<g stroke="${rc}" stroke-width="2" fill="none" stroke-linecap="round"><path d="M14 52 Q12 58 10 66"/><path d="M25 52 Q25 60 25 68"/><path d="M36 52 Q38 58 40 66"/></g>`;
  } else if(t==='premolar') {
    vb='0 0 42 70'; W=sz||37; H=Math.round((W/42)*70);
    body='M8 10 Q4 10 4 18 L4 24 Q2 32 4 40 Q6 48 12 52 Q18 56 21 56 Q24 56 30 52 Q36 48 38 40 Q40 32 38 24 L38 18 Q38 10 34 10 Q30 4 21 4 Q12 4 8 10 Z';
    dets=`<path d="M10 14 Q14 8 21 8 Q28 8 32 14" fill="none" stroke="${stk}" stroke-width="1" opacity="0.6"/><path d="M21 14 L21 28" stroke="${stk}" stroke-width="1" opacity="0.3"/>`;
    roots=`<g stroke="${rc}" stroke-width="2" fill="none" stroke-linecap="round"><path d="M14 54 Q12 60 10 66"/><path d="M28 54 Q30 60 32 66"/></g>`;
  } else if(t==='canine') {
    vb='0 0 38 78'; W=sz||34; H=Math.round((W/38)*78);
    body='M6 30 Q3 30 3 35 L6 48 Q8 56 12 60 Q16 64 19 64 Q22 64 26 60 Q30 56 32 48 L35 35 Q35 30 32 30 L28 12 Q22 3 19 3 Q16 3 10 12 Z';
    dets=`<path d="M10 28 Q14 20 19 16 Q24 20 28 28" fill="none" stroke="${stk}" stroke-width="1" opacity="0.5"/>`;
    roots=`<g stroke="${rc}" fill="none" stroke-linecap="round"><path d="M19 62 Q19 68 19 74" stroke-width="2.5"/></g>`;
  } else {
    vb='0 0 34 64'; W=sz||32; H=Math.round((W/34)*64);
    body='M4 8 Q2 8 2 12 L2 32 Q2 42 6 46 Q10 50 17 50 Q24 50 28 46 Q32 42 32 32 L32 12 Q32 8 30 8 Q26 4 17 4 Q8 4 4 8 Z';
    dets=`<path d="M6 14 Q10 8 17 8 Q24 8 28 14" fill="none" stroke="${stk}" stroke-width="1" opacity="0.5"/><path d="M12 12 Q14 10 17 10 Q20 10 22 12" fill="none" stroke="${stk}" stroke-width="0.8" opacity="0.4"/>`;
    roots=`<g stroke="${rc}" fill="none" stroke-linecap="round"><path d="M17 48 Q17 54 17 60" stroke-width="2"/></g>`;
  }

  if(status==='crown') xtr=`<path d="${body}" fill="none" stroke="${fill}" stroke-width="1.8" stroke-dasharray="4,3" opacity="0.55"/>`;
  else if(status==='caries') { const cx=t==='canine'?14:t==='incisor'?11:15, cy=t==='canine'?42:t==='incisor'?30:28; xtr=`<circle cx="${cx}" cy="${cy}" r="4" fill="${fill}" opacity="0.9"/><circle cx="${cx+14}" cy="${cy-10}" r="2.5" fill="${fill}" opacity="0.7"/>`; }
  else if(status==='devitalized') { const cx=t==='canine'?19:t==='incisor'?17:22, cy=t==='canine'?38:t==='incisor'?26:28; xtr=`<line x1="${cx-6}" y1="${cy-6}" x2="${cx+6}" y2="${cy+6}" stroke="${fill}" stroke-width="1.8"/><line x1="${cx+6}" y1="${cy-6}" x2="${cx-6}" y2="${cy+6}" stroke="${fill}" stroke-width="1.8"/>`; }
  else if(status==='implant') { const cy=t==='canine'?46:t==='incisor'?35:32, cx=t==='canine'?19:t==='incisor'?17:24; xtr=`<circle cx="${cx}" cy="${cy}" r="5" fill="none" stroke="${fill}" stroke-width="1.5" stroke-dasharray="3,2"/>`; }
  else if(status==='sealed') xtr=`<path d="${body}" fill="none" stroke="${fill}" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>`;
  else if(status==='extracted') xtr=`<line x1="8" y1="8" x2="28" y2="28" stroke="${fill}" stroke-width="2" opacity="0.45"/><line x1="28" y1="8" x2="8" y2="28" stroke="${fill}" stroke-width="2" opacity="0.45"/>`;

  const fa = DK?'rgba(255,255,255,.04)':'rgba(255,255,255,.5)';
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" width="${W}" height="${H}" class="tooth-svg">
  ${roots}
  <path d="${body}" fill="${fill}" stroke="${stk}" stroke-width="1.5" opacity="${op}"/>
  <path d="${body}" fill="${fa}" stroke="none" opacity="${op}"/>
  ${dets}${xtr}
</svg>`;
}

function buildToothSlot(n, st, isUpper, pid) {
  const wrap = el('div', `tooth-wrap${isUpper?' upper':''}${st==='absent'?' absent':''}`);
  const tip = `<strong style="color:var(--acc)">${n}</strong> ${TOOTH_N[n]||''}<br><span style="color:${TOOTH_C[st]}">${TOOTH_L[st]||'Sain'}</span>`;
  wrap.innerHTML = isUpper ? `${toothSVG(n,st)}<div class="tooth-lbl">${n}</div>` : `<div class="tooth-lbl">${n}</div>${toothSVG(n,st)}`;
  if(isUpper){ const svg=wrap.querySelector('.tooth-svg'); if(svg)svg.style.transform='scaleY(-1)'; }
  wrap.addEventListener('mouseenter', e=>showTip(e,tip));
  wrap.addEventListener('mousemove', moveTip);
  wrap.addEventListener('mouseleave', hideTip);
  wrap.addEventListener('click', ()=>openToothModal(pid,n));
  return wrap;
}

  cont.appendChild(leg);

function pcol(v){ if(v<=0)return{bg:'var(--s3)',c:'var(--text3)'}; if(v<=3)return{bg:'rgba(61,255,160,.14)',c:'var(--acc)'}; if(v<=5)return{bg:'rgba(255,184,48,.14)',c:'var(--warn)'}; if(v<=7)return{bg:'rgba(255,140,66,.14)',c:'#ff8c42'}; return{bg:'rgba(255,77,109,.18)',c:'var(--danger)'}; }

function initParo(pid) {
  if(PARO[pid]) return;
  const p=getP(pid); if(!p)return;
  PARO[pid]={};
  const rp=b=>[0,1,2].map(()=>Math.max(1,Math.min(9,b+Math.round((Math.random()-.4)*2.5))));
  [...upper,...lower].forEach(n=>{
    const st=p.teeth[n]||'healthy', abs=st==='absent', car=st==='caries'||st==='devitalized', b=car?5:abs?0:2;
    PARO[pid][n]={bu:abs?[0,0,0]:rp(b),pa:abs?[0,0,0]:rp(b),bb:abs?[false,false,false]:[Math.random()>.72,Math.random()>.8,Math.random()>.75],pb:abs?[false,false,false]:[Math.random()>.74,Math.random()>.82,Math.random()>.78],rec:[Math.round(Math.random()*2),Math.round(Math.random()*1.5),Math.round(Math.random()*2)],mob:car?1:0};
  });
}

function buildParo(pid, cont) {
  initParo(pid);
  const p=getP(pid); if(!p)return;
  const allT=Object.fromEntries([...upper,...lower].map(n=>[n, p.teeth[n]||'healthy']));
  cont.innerHTML='';
  const wrap=el('div',''); wrap.style.overflowX='auto'; cont.appendChild(wrap);
  buildParoArch(pid,upper,false,wrap,allT);
  const div=el('div',''); div.style.cssText='display:flex;align-items:center;gap:9px;margin:12px 0 6px;'; div.innerHTML='<div style="flex:1;height:1px;background:var(--border)"></div><div style="font-size:9px;color:var(--text3);padding:2px 8px;border:1px solid var(--border);border-radius:20px;background:var(--s2)">SUP / INF</div><div style="flex:1;height:1px;background:var(--border)"></div>'; wrap.appendChild(div);
  buildParoArch(pid,lower,true,wrap,allT);
  const sumEl=el('div',''); sumEl.id='psum-'+pid; sumEl.style.cssText='margin-top:10px;padding:11px;background:var(--s2);border:1px solid var(--border);border-radius:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;'; wrap.appendChild(sumEl);
  updateParoSum(pid);
}

function buildParoArch(pid, teeth, isLow, cont, allT) {
  const cols=teeth.length;
  const gs=`display:grid;grid-template-columns:70px repeat(${cols},1fr);align-items:center;`;
  const color=isLow?'var(--info)':'var(--acc)';
  const ttl=el('div',''); ttl.style.cssText='font-family:Syne,sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 0 3px;display:flex;align-items:center;gap:6px;'; ttl.innerHTML=`<div style="width:3px;height:11px;border-radius:2px;background:${color}"></div>${isLow?'ARCADE INF.':'ARCADE SUP.'}`; cont.appendChild(ttl);

  function row(lbl,cells,mb){const r=el('div','');r.style.cssText=gs+`margin-bottom:${mb||'2px'};`;const l=el('div','');l.style.cssText='font-size:9px;color:var(--text2);text-align:right;padding-right:7px;white-space:nowrap;display:flex;align-items:center;justify-content:flex-end;';l.textContent=lbl;r.appendChild(l);cells.forEach(c=>r.appendChild(c));cont.appendChild(r);}

  row('',teeth.map(n=>{const c=el('div','');c.style.cssText='text-align:center;font-family:Syne;font-size:9px;font-weight:700;color:'+(allT[n]==='absent'?'var(--text3)':'var(--acc)')+';padding:2px 0;cursor:pointer;';c.textContent=n;c.onclick=()=>openToothModal(pid,n);return c;}),'3px');
  row('BOP '+(isLow?'LING.':'PAL.'),teeth.map(n=>mkBop(pid,n,'pb',allT)));
  row('REC.',teeth.map(n=>mkRec(pid,n,allT)));
  row('SOND. '+(isLow?'LING.':'PAL.'),teeth.map(n=>mkProbe(pid,n,'pa',allT)),'1px');

  const gr=el('div',''); gr.style.cssText=gs+'margin:2px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:2px 0;';
  const gl=el('div',''); gl.style.cssText='font-size:8px;color:var(--text3);text-align:right;padding-right:7px;'; gl.textContent='GRAPH'; gr.appendChild(gl);
  teeth.forEach(n=>{const c=el('div','');c.style.cssText='display:flex;justify-content:center;align-items:flex-end;height:32px;gap:1px;padding:1px;';const pd=PARO[pid]?.[n];if(!pd||allT[n]==='absent'){c.innerHTML='<div style="width:26px;height:1px;background:var(--border);margin:auto 0 0"></div>';gr.appendChild(c);return;}[...pd.pa,...pd.bu].forEach((v,vi)=>{const pc2=pcol(v);const b=el('div','');b.style.cssText=`background:${pc2.c};width:4px;border-radius:2px 2px 0 0;height:${Math.round((v/9)*28)}px;opacity:${vi<3?.5:1};`;c.appendChild(b);});gr.appendChild(c);});
  cont.appendChild(gr);

  row('SOND. BUCC.',teeth.map(n=>mkProbe(pid,n,'bu',allT)),'1px');
  row('BOP BUCC.',teeth.map(n=>mkBop(pid,n,'bb',allT)));
  row('MOB.',teeth.map(n=>mkMob(pid,n,allT)),'6px');
}

function mkBop(pid,n,key,allT){const c=el('div','');c.style.cssText='display:flex;justify-content:center;gap:2px;padding:1px 0;';if(allT[n]==='absent'){c.innerHTML='<span style="color:var(--text3);font-size:8px">—</span>';return c;}const pd=PARO[pid]?.[n];if(!pd)return c;(pd[key]||[false,false,false]).forEach((v,i)=>{const d=el('div',`bop-d ${v?'pos':'neg'}`);d.onclick=()=>{if(PARO[pid]?.[n]){PARO[pid][n][key][i]=!PARO[pid][n][key][i];d.className='bop-d '+(PARO[pid][n][key][i]?'pos':'neg');updateParoSum(pid);}};c.appendChild(d);});return c;}
function mkRec(pid,n,allT){const c=el('div','');c.style.cssText='display:flex;justify-content:center;gap:2px;';if(allT[n]==='absent'){c.innerHTML='<span style="color:var(--text3);font-size:8px">—</span>';return c;}const pd=PARO[pid]?.[n];if(!pd)return c;(pd.rec||[0,0,0]).forEach((v,i)=>{const d=el('div','');d.style.cssText=`width:15px;height:17px;border-radius:3px;font-size:8px;display:flex;align-items:center;justify-content:center;background:${v>0?'rgba(255,184,48,.12)':'var(--s2)'};border:1px solid ${v>0?'rgba(255,184,48,.3)':'var(--border)'};color:${v>0?'var(--warn)':'var(--text3)'};cursor:pointer;`;d.textContent=v;d.onclick=()=>{pd.rec[i]=(pd.rec[i]+1)%4;d.textContent=pd.rec[i];};c.appendChild(d);});return c;}
function mkProbe(pid,n,key,allT){const c=el('div','');c.style.cssText='display:flex;justify-content:center;gap:2px;padding:1px 0;';if(allT[n]==='absent'){c.innerHTML='<span style="color:var(--text3);font-size:8px">—</span>';return c;}const pd=PARO[pid]?.[n];if(!pd)return c;(pd[key]||[2,2,2]).forEach((v,i)=>{const pc2=pcol(v);const d=el('div','');d.style.cssText=`background:${pc2.bg};color:${pc2.c};width:16px;height:19px;border-radius:3px;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;`;d.textContent=v;d.onclick=()=>{const inp=el('input','');inp.type='number';inp.value=v;inp.style.cssText='width:16px;height:19px;background:var(--s1);border:1px solid var(--acc);border-radius:3px;color:var(--text);font-size:8px;text-align:center;padding:0;outline:none;font-family:DM Mono,monospace;';const commit=()=>{const nv=Math.max(0,Math.min(9,+inp.value||0));pd[key][i]=nv;const np=pcol(nv);d.style.background=np.bg;d.style.color=np.c;d.textContent=nv;d.style.display='flex';inp.replaceWith(d);updateParoSum(pid);};inp.onblur=commit;inp.onkeydown=e=>{if(e.key==='Enter')commit();};d.style.display='none';d.after(inp);inp.focus();inp.select();};c.appendChild(d);});return c;}
function mkMob(pid,n,allT){const c=el('div','');c.style.cssText='display:flex;justify-content:center;';if(allT[n]==='absent'){c.innerHTML='<span style="color:var(--text3);font-size:8px">—</span>';return c;}const pd=PARO[pid]?.[n];if(!pd)return c;const s=el('select','');s.style.cssText='background:var(--s2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:8px;padding:2px 3px;width:30px;font-family:DM Mono,monospace;cursor:pointer;';[0,1,2,3].forEach(v=>{const o=el('option','',''+v);o.selected=pd.mob===v;s.appendChild(o);});s.onchange=()=>{pd.mob=+s.value;};c.appendChild(s);return c;}

function updateParoSum(pid) {
  const el_s=$('psum-'+pid); if(!el_s)return;
  const pd=PARO[pid]; if(!pd)return;
  let totBop=0,totT=0,maxD=0,sumD=0,cnt=0;
  Object.values(pd).forEach(d=>{ if(!d.bu)return; totBop+=(d.bb||[]).filter(Boolean).length+(d.pb||[]).filter(Boolean).length; totT+=6; [...(d.bu||[]),...(d.pa||[])].forEach(v=>{if(v>0){sumD+=v;cnt++;if(v>maxD)maxD=v;}}); });
  const bopPct=totT?Math.round(totBop/totT*100):0, avgD=cnt?Math.round(sumD/cnt*10)/10:0;
  el_s.innerHTML=`<div style="text-align:center"><div style="font-family:Syne;font-size:18px;font-weight:800;color:${bopPct>20?'var(--danger)':'var(--acc)'}">${bopPct}%</div><div style="font-size:9px;color:var(--text3)">BOP</div></div>
    <div style="text-align:center"><div style="font-family:Syne;font-size:18px;font-weight:800;color:${avgD>4?'var(--warn)':'var(--acc)'}">${avgD}</div><div style="font-size:9px;color:var(--text3)">Sond. moy. mm</div></div>
    <div style="text-align:center"><div style="font-family:Syne;font-size:18px;font-weight:800;color:${maxD>=6?'var(--danger)':'var(--text)'}">${maxD}</div><div style="font-size:9px;color:var(--text3)">Sond. max mm</div></div>
    <div style="text-align:center"><div style="font-family:Syne;font-size:18px;font-weight:800">${totBop}</div><div style="font-size:9px;color:var(--text3)">Sites BOP+</div></div>`;
}

function renderDashboard() {

   {v:tndFmt(todRevenue),l:'Encaissé aujourd\'hui',t:'Journée en cours',c:'var(--warn)',pct:todRevenue/800*100},

  const row=el('div',''); row.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:14px;';

  const aj=el('div','card'); aj.innerHTML=`<div class="ct"><div class="ctd"></div>Agenda du jour — ${fmtDate(tod)}</div>`;

      <div style="flex:1"><div style="font-size:12px;font-weight:500">${pt?pt.prenom+' '+pt.nom:'—'}</div><div style="font-size:10px;color:var(--text2)">${TL[a.type]||a.type} · ${a.dur}min</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><span class="badge ${SC_RDV[a.status]}">${SL_RDV[a.status]}</span><span style="font-size:10px;font-weight:600;color:var(--acc)">${tndFmt(a.montant)}</span></div>
    </div>`;
  });
  row.appendChild(aj);

  const rc=el('div',''); rc.style.cssText='display:flex;flex-direction:column;gap:12px;';
  const al=el('div','card'); al.innerHTML=`<div class="ct"><div class="ctd" style="background:var(--danger);box-shadow:0 0 6px var(--danger)"></div>Alertes médicales</div>`;

    al.innerHTML+=`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div class="av av-s" style="background:${avBg(p.nom)};color:#0b0d12">${initials(p)}</div>
      <div style="flex:1"><div style="font-size:11px;font-weight:500">${p.prenom} ${p.nom}</div>
      ${p.ant.allergies.length?`<div style="font-size:10px;color:var(--danger)">⚠ ${p.ant.allergies.join(', ')}</div>`:''}
      ${p.ant.med.filter(m=>/anticoagulant|bisphosphonate|insuffisance/i.test(m)).map(m=>`<div style="font-size:10px;color:var(--warn)">⚠ ${m}</div>`).join('')}</div>
    </div>`;
  });
  rc.appendChild(al);

  const cr=el('div','card'); cr.innerHTML=`<div class="ct"><div class="ctd" style="background:var(--warn);box-shadow:0 0 6px var(--warn)"></div>Soldes patients</div>`;
  const debtors=PATIENTS.filter(p=>p.balance>0).sort((a,b)=>b.balance-a.balance);
  if(!debtors.length) cr.innerHTML+='<div style="font-size:12px;color:var(--acc);padding:8px 0">Aucune créance 🎉</div>';
  debtors.forEach(p=>{ cr.innerHTML+=`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openPatientDetail(${p.id})">

  WAITING_ROOM.slice(0,3).forEach(w=>{ wrCard.innerHTML+=`<div style="display:flex;align-items:center;gap:9px;padding:6px 0"><div style="width:8px;height:8px;border-radius:50%;background:${w.called?'var(--acc)':'var(--warn)'}"></div><span style="font-size:12px">${w.nom}</span><span style="font-size:10px;color:var(--text3);margin-left:auto">${w.heure}</span>${w.called?'<span class="badge bg-g">Appelé</span>':''}</div>`; });
  wrCard.innerHTML+=`<button class="btn btn-o btn-sm" style="margin-top:8px" onclick="nav('waiting')">Gérer la salle →</button>`;
  pg.appendChild(wrCard);
}

function renderPatients(filter='') {
  const pg=$('page-patients'); pg.innerHTML='';
  const ph=el('div',''); ph.style.cssText='display:flex;align-items:center;justify-content:space-between;';
  ph.innerHTML=`<div><div class="ph-t">Patients</div><div class="ph-s">${PATIENTS.length} patients</div></div>`;
  const btn=el('button','btn btn-a','+ Nouveau patient'); btn.onclick=()=>openPtForm(); ph.appendChild(btn);
  pg.appendChild(ph);
  const sbar=el('div','sbar'); sbar.innerHTML=`<span style="color:var(--text3)">⌕</span><input id="pt-s" placeholder="Rechercher…" value="${filter}" oninput="renderPatients(this.value)">`; pg.appendChild(sbar);
  const q=filter.toLowerCase();
  const filtered=PATIENTS.filter(p=>!q||p.nom.toLowerCase().includes(q)||p.prenom.toLowerCase().includes(q)||p.tel.includes(q));
  const grid=el('div','pt-grid');

    const card=el('div','pt-card'); card.onclick=()=>openPatientDetail(p.id);
    card.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div class="av av-l" style="background:${bg};color:#0b0d12">${initials(p)}</div>
      <div style="flex:1;min-width:0"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:13px">${p.prenom} ${p.nom}</div>
      <div style="font-size:10px;color:var(--text2)">${p.dob} · ${p.groupe}</div>
      ${todAppt?`<span class="badge bg-g" style="margin-top:3px">RDV ${todAppt.time}</span>`:''}</div></div>
    <div class="pt-meta">
      <div>📞 <span>${p.tel}</span></div><div>♂/♀ <span>${p.sexe==='M'?'Homme':'Femme'}</span></div>
      <div>💼 <span>${p.profession||'—'}</span></div>
      <div>💰 <span style="color:${p.balance>0?'var(--danger)':'var(--text2)'}">${p.balance>0?tndFmt(p.balance):'À jour'}</span></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:8px">
      ${p.ant.allergies.map(a=>`<span class="badge bg-r" style="font-size:9px">⚠ ${a}</span>`).join('')}

function switchPtTab(btn, tcId) {
  const modal=btn.closest('.modal');
  qsa('.tab',modal).forEach(t=>t.classList.remove('act'));
  qsa('.tc',modal).forEach(t=>t.classList.remove('act'));
  btn.classList.add('act');
  const tc=$(tcId); if(tc) tc.classList.add('act');
  const cc=modal.querySelector('[id^="chart-cont-"]');
  const pid=cc?parseInt(cc.id.split('-')[2]):0;
  if(tcId==='pt-chart'&&pid){const c=$('chart-cont-'+pid);if(c&&!c.children.length)buildChart(pid,c);}
  if(tcId==='pt-paro'&&pid){const c=$('paro-cont-'+pid);if(c&&!c.children.length)buildParo(pid,c);}
}

function buildPtInfo(p) {

function renderAgenda() {
  const pg=$('page-agenda'); pg.innerHTML='';
  const ph=el('div',''); ph.style.cssText='display:flex;align-items:center;justify-content:space-between;';
  ph.innerHTML=`<div><div class="ph-t">Agenda</div></div><div style="display:flex;gap:7px;align-items:center">

      <button class="tab ${APP.calView==='monthly'?'act':''}" onclick="setCalView('monthly',this)">Mois</button>
      <button class="tab ${APP.calView==='weekly'?'act':''}" onclick="setCalView('weekly',this)">Semaine</button>
    </div>

  APPOINTMENTS.filter(a=>a.date>=todayStr()&&a.status!=='cancelled').sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,8).forEach(a=>{
    const pt=getP(a.patientId);
    upcoming.innerHTML+=`<div class="tx-row" onclick="openApptModal(${a.id})" style="cursor:pointer"><div class="av av-s" style="background:${pt?avBg(pt.nom):'#888'};color:#0b0d12">${pt?initials(pt):'?'}</div><div style="flex:1"><div style="font-size:12px;font-weight:500">${pt?pt.prenom+' '+pt.nom:'—'}</div><div style="font-size:10px;color:var(--text2)">${fmtDate(a.date)} à ${a.time} · ${TL[a.type]||a.type}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><span class="badge ${SC_RDV[a.status]}">${SL_RDV[a.status]}</span><span style="font-size:10px;color:var(--acc)">${tndFmt(a.montant)}</span></div></div>`;

function setCalView(v,btn){ APP.calView=v; qsa('.tab',btn.closest('div')).forEach(b=>b.classList.remove('act')); btn.classList.add('act'); renderCal(); }
function calNav(d){ if(APP.calView==='monthly') APP.calDate.setMonth(APP.calDate.getMonth()+d); else APP.calDate.setDate(APP.calDate.getDate()+7*d); renderCal(); }
function calNavToday(){ APP.calDate=new Date(2025,5,1); renderCal(); }
function renderCal(){ const w=$('cal-wrap'); if(!w)return; APP.calView==='monthly'?renderMonthly(w):renderWeekly(w); }
const DAYNAMES=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
function renderMonthly(cont) {
  const y=APP.calDate.getFullYear(), m=APP.calDate.getMonth();
  cont.innerHTML=`<div style="text-align:center;font-family:Syne,sans-serif;font-weight:700;font-size:16px;margin-bottom:12px">${MONTHS[m]} ${y}</div><div class="cal-grid">${DAYNAMES.map(d=>`<div class="cdname">${d}</div>`).join('')}</div>`;
  const grid=el('div','cal-grid'); grid.style.gap='3px';
  const first=new Date(y,m,1), startDay=(first.getDay()+6)%7, days=new Date(y,m+1,0).getDate(), prev=new Date(y,m,0).getDate();
  for(let i=0;i<startDay;i++){const d=el('div','cday om');d.innerHTML=`<div class="cday-n">${prev-startDay+1+i}</div>`;grid.appendChild(d);}
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, isT=ds===todayStr();
    const cell=el('div',`cday${isT?' tod':''}`); cell.onclick=()=>openApptModal(null,null,ds);
    cell.innerHTML=`<div class="cday-n">${d}</div>`;
    APPOINTMENTS.filter(a=>a.date===ds&&a.status!=='cancelled').slice(0,3).forEach(a=>{const ce=el('div',`cev ${TC[a.type]||''}`);ce.textContent=`${a.time} ${(TL[a.type]||a.type).slice(0,7)}`;cell.appendChild(ce);});
    grid.appendChild(cell);
  }
  const rem=(7-(startDay+days)%7)%7; for(let i=1;i<=rem;i++){const d=el('div','cday om');d.innerHTML=`<div class="cday-n">${i}</div>`;grid.appendChild(d);}
  cont.appendChild(grid);
}
function renderWeekly(cont) {
  const d=new Date(APP.calDate), day=d.getDay(), mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1));
  const week=[]; for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);week.push(dd);}
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  cont.innerHTML='';
  const hdiv=el('div',''); hdiv.style.cssText='display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid var(--border);';
  hdiv.innerHTML='<div style="padding:7px"></div>';
  week.forEach(d=>{const ds=fmt(d),isT=ds===todayStr();hdiv.innerHTML+=`<div class="wk-dh" style="${isT?'color:var(--acc)':''}"><div style="font-size:9px;color:var(--text3);text-transform:uppercase">${DAYNAMES[(d.getDay()+6)%7]}</div><div style="font-family:Syne;font-weight:700;font-size:14px${isT?';color:var(--acc)':''}">${d.getDate()}</div></div>`;});
  cont.appendChild(hdiv);
  const body=el('div',''); body.style.cssText='display:grid;grid-template-columns:52px repeat(7,1fr);overflow-y:auto;max-height:520px;';
  const times=[]; for(let h=8;h<20;h++)times.push(`${String(h).padStart(2,'0')}:00`);
  const tc=el('div','wk-tc'); times.forEach(t=>{const ts=el('div','wk-ts');ts.textContent=t;tc.appendChild(ts);}); body.appendChild(tc);
  week.forEach(wd=>{
    const ds=fmt(wd), isT=ds===todayStr();
    const col=el('div',`wk-dc${isT?' tod':''}`);
    times.forEach(t=>{const s=el('div','wk-slot');s.onclick=()=>openApptModal(null,null,ds);col.appendChild(s);});
    APPOINTMENTS.filter(a=>a.date===ds&&a.status!=='cancelled').forEach(a=>{
      const [ah,am]=a.time.split(':').map(Number);
      const top=(ah-8)*48+Math.round(am*48/60), h=Math.round((a.dur||30)*48/60);
      const ae=el('div',`wk-ap ${TC[a.type]||''}`); ae.style.cssText=`top:${top}px;height:${h}px;`;
      const pt=getP(a.patientId); ae.innerHTML=`<strong>${a.time}</strong> ${pt?pt.prenom:'—'}`;
      ae.onclick=e=>{e.stopPropagation();openApptModal(a.id);}; col.appendChild(ae);
    });
    body.appendChild(col);
  });
  cont.appendChild(body);
}

function saveAppt() {

function renderWaiting() {
  const pg=$('page-waiting'); pg.innerHTML='';
  const ph=el('div',''); ph.style.cssText='display:flex;align-items:center;justify-content:space-between;';
  ph.innerHTML=`<div><div class="ph-t">Salle d'attente</div></div><button class="btn btn-a" onclick="openWrAdd()">+ Arrivée patient</button>`;
  pg.appendChild(ph);

  const rdvCard=el('div','card'); rdvCard.innerHTML=`<div class="ct"><div class="ctd"></div>RDV du jour — patients non encore arrivés</div>`;
  const notArrived=todayAppts.filter(a=>!WAITING_ROOM.find(w=>w.apptId===a.id));

  pg.appendChild(rdvCard);

  const wrCard=el('div','card'); wrCard.innerHTML=`<div class="ct"><div class="ctd" style="background:var(--info)"></div>En attente (${WAITING_ROOM.filter(w=>!w.called).length})</div>`;
  if(!WAITING_ROOM.length) wrCard.innerHTML+='<div style="font-size:12px;color:var(--text3);padding:4px 0">La salle est vide.</div>';

    </div>
    <div style="display:flex;gap:5px">${!w.called?`<button class="btn btn-a btn-xs" onclick="callPatient(${w.id})">Appeler →</button>`:'<span class="badge bg-g">Appelé ✓</span>'}<button class="btn btn-o btn-xs" onclick="removeWr(${w.id})">✕</button></div>
  </div>`; });

function markArrived(apptId, patientId) {

}
function callPatient(id){ const w=WAITING_ROOM.find(x=>x.id===id);if(!w)return; w.called=true; toast(`${w.nom} appelé(e)`,'ok'); renderWaiting(); }
function removeWr(id){ WAITING_ROOM.splice(WAITING_ROOM.findIndex(w=>w.id===id),1); toast('Patient retiré','in'); renderWaiting(); renderDashboard(); }

function renderCaisse() {

  ph.innerHTML=`<div><div class="ph-t">Caisse</div></div><button class="btn btn-a" onclick="openPayModal()">+ Encaissement</button>`; pg.appendChild(ph);
  const todRevenue=APPOINTMENTS.filter(a=>a.date===todayStr()).reduce((s,a)=>s+(a.paye||0),0);

  [...TRANSACTIONS].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).forEach(t=>{ const pt=getP(t.patientId); txCard.innerHTML+=`<div class="tx-row"><div class="av av-s" style="background:${pt?avBg(pt.nom):'#888'};color:#0b0d12">${pt?initials(pt):'?'}</div><div style="flex:1"><div style="font-size:12px">${pt?pt.prenom+' '+pt.nom:'—'}</div><div style="font-size:10px;color:var(--text2)">${fmtDate(t.date)} · ${t.note||'—'}</div></div><div style="font-family:Syne;font-weight:700;font-size:13px;color:var(--acc)">+${tndFmt(t.montant)}</div></div>`; });
  if(!TRANSACTIONS.length) txCard.innerHTML+='<div style="text-align:center;padding:20px;color:var(--text3)">💳 Aucune transaction</div>';
  row.appendChild(txCard);
  const balCard=el('div','card'); balCard.innerHTML=`<div class="ct"><div class="ctd" style="background:var(--danger)"></div>Créances patients</div>`;
  const debtors=PATIENTS.filter(p=>p.balance>0).sort((a,b)=>b.balance-a.balance);

function openPayModal(pid, apptId) {
  const p=pid?getP(pid):null, appt=apptId?APPOINTMENTS.find(a=>a.id===apptId):null;
  $('m-pay').innerHTML=`<div class="modal m-sm"><div class="mh"><div class="mt">💰 Enregistrer un paiement</div><button class="mc" onclick="closeM('m-pay')">✕</button></div>
    <div class="fg" style="margin-bottom:12px"><label class="fl">Patient</label><select class="fs" id="pay-pt">${PATIENTS.map(pt=>`<option value="${pt.id}" ${pt.id===(pid||1)?'selected':''}>${pt.prenom} ${pt.nom} — Solde: ${tndFmt(pt.balance)}</option>`).join('')}</select></div>
    ${p?`<div style="padding:10px 12px;background:var(--s2);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--text2)">Solde: <strong style="color:${p.balance>0?'var(--danger)':'var(--acc)'}">${tndFmt(p.balance)}</strong>${appt?` · RDV dû: <strong style="color:var(--danger)">${tndFmt(appt.montant-appt.paye)}</strong>`:''}</div>`:''}

  openM('m-pay');
}
function savePay(pid, apptId) {
  const ptId=+($('pay-pt')?.value||pid)||1, montant=+$('pay-montant').value||0, date=$('pay-date').value, note=$('pay-note').value;
  if(montant<=0){ toast('Montant invalide','er'); return; }
  const pt=getP(ptId); if(!pt)return;
  pt.balance=Math.max(0,(pt.balance||0)-montant);
  if(apptId){ const a=APPOINTMENTS.find(x=>x.id===apptId); if(a)a.paye=Math.min(a.montant,(a.paye||0)+montant); }
  const newId=Math.max(0,...TRANSACTIONS.map(t=>t.id))+1;
  TRANSACTIONS.push({id:newId,patientId:ptId,apptId:apptId||null,date,montant,type:'encaissement',note});
  toast(`Paiement de ${tndFmt(montant)} enregistré`,'ok'); closeM('m-pay'); renderCaisse(); renderDashboard();
}

    <div style="display:flex;flex-direction:column;gap:3px">${ord.meds.slice(0,3).map(m=>`<div style="font-size:11px;color:var(--text2)"><strong style="color:var(--text)">${m.nom}</strong> · ${m.pos}</div>`).join('')}${ord.meds.length>3?`<div style="font-size:10px;color:var(--text3)">+${ord.meds.length-3} autres</div>`:''}</div>
    ${ord.notes?`<div style="margin-top:7px;padding:6px 8px;background:var(--s2);border-radius:6px;font-size:10px;color:var(--text2)">${ord.notes}</div>`:''}
    <div style="display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)"><button class="btn btn-o btn-xs" onclick="event.stopPropagation();viewOrd(${ord.id})">🖨 Imprimer</button><button class="btn btn-o btn-xs" onclick="event.stopPropagation();openOrdModal(${ord.id})">✏ Modifier</button></div>`;
    grid.appendChild(card);
  });
  if(!ORDONNANCES.length) grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">💊 Aucune ordonnance</div>';
  pg.appendChild(grid);
}
let editOrdId=null;
function openOrdModal(ordId) {
  editOrdId=ordId||null; drugCnt=0;
  const ord=ordId?ORDONNANCES.find(o=>o.id===ordId):null;
  $('m-ord').innerHTML=`<div class="modal m-lg"><div class="mh"><div class="mt">${ord?'Modifier':'Nouvelle'} ordonnance</div><button class="mc" onclick="closeM('m-ord')">✕</button></div>
    <div class="form-row fr2" style="margin-bottom:12px"><div class="fg"><label class="fl">Patient</label><select class="fs" id="ord-pt">${PATIENTS.map(p=>`<option value="${p.id}" ${ord?.patientId===p.id?'selected':''}>${p.prenom} ${p.nom}</option>`).join('')}</select></div><div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="ord-date" value="${ord?.date||todayStr()}"></div></div>
    <div class="ct"><div class="ctd"></div>Médicaments prédéfinis — cliquer pour ajouter</div>
    <div class="med-presets">${MED_PRESETS.map(m=>`<div class="med-pr" onclick="addMedPreset(${m.id})"><div style="font-weight:600;font-size:11px;color:var(--text);margin-bottom:2px">${m.nom}</div><div style="font-size:9px;color:var(--text3)">${m.pos} · ${m.dur}</div></div>`).join('')}</div>
    <div class="ct"><div class="ctd"></div>Médicaments prescrits</div>
    <div id="med-list">${(ord?.meds||[]).map((m,i)=>buildDrugRow(i,m)).join('')}</div>
    <button class="btn btn-o btn-sm" onclick="addDrug()" style="margin-bottom:12px">+ Ajouter</button>
    <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="ord-notes">${ord?.notes||''}</textarea></div>
    <div class="mf"><button class="btn btn-o" onclick="closeM('m-ord')">Annuler</button><button class="btn btn-a" onclick="saveOrd()">Enregistrer</button></div></div>`;
  openM('m-ord');
}
function buildDrugRow(i, m) {
  return `<div class="drug-row" id="dr-${i}"><input class="fi" placeholder="Médicament" value="${m?.nom||''}" style="min-width:0" id="dn-${i}"><input class="fi" placeholder="Posologie" value="${m?.pos||''}" style="min-width:0" id="dp-${i}"><input class="fi" placeholder="Durée" value="${m?.dur||''}" style="min-width:0;font-size:11px" id="dd-${i}"><button style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px;line-height:1;transition:color .2s" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text3)'" onclick="this.closest('.drug-row').remove()">✕</button></div>`;
}
function addDrug(){ drugCnt++; $('med-list').insertAdjacentHTML('beforeend',buildDrugRow(drugCnt+100,{})); }
function addMedPreset(id){ const m=MED_PRESETS.find(x=>x.id===id);if(!m)return; drugCnt++; $('med-list').insertAdjacentHTML('beforeend',buildDrugRow(drugCnt+100,{nom:m.nom,pos:m.pos,dur:m.dur})); toast(m.nom+' ajouté','ok'); }
function getMedsFromForm(){ return qsa('.drug-row',$('med-list')).map(r=>({nom:r.querySelector('[id^="dn-"]').value.trim(),pos:r.querySelector('[id^="dp-"]').value.trim(),dur:r.querySelector('[id^="dd-"]').value.trim()})).filter(m=>m.nom); }
function saveOrd(){
  const pid=+$('ord-pt').value, date=$('ord-date').value, notes=$('ord-notes').value, meds=getMedsFromForm();
  if(!meds.length){ toast('Ajoutez au moins un médicament','er'); return; }
  if(editOrdId){ const o=ORDONNANCES.find(x=>x.id===editOrdId);if(o){Object.assign(o,{patientId:pid,date,meds,notes});toast('Ordonnance modifiée','ok');} }
  else { const newId=Math.max(0,...ORDONNANCES.map(o=>o.id))+1; ORDONNANCES.push({id:newId,patientId:pid,date,meds,notes}); toast('Ordonnance créée','ok'); }
  closeM('m-ord'); renderOrdonnances();
}
function viewOrd(id){
  const ord=ORDONNANCES.find(o=>o.id===id);if(!ord)return; const pt=getP(ord.patientId);
  $('m-print').innerHTML=`<div class="modal m-md"><div class="mh"><div class="mt">Ordonnance</div><div style="display:flex;gap:5px"><button class="btn btn-a btn-sm" onclick="window.print()">🖨 Imprimer</button><button class="mc" onclick="closeM('m-print')">✕</button></div></div>
    <div class="print-preview"><div style="border-bottom:2px solid #1a1a2e;padding-bottom:14px;margin-bottom:14px"><div style="font-family:Syne,sans-serif;font-weight:800;font-size:20px;color:#1a1a2e">SmileSync — Cabinet Dentaire</div><div style="font-size:12px;color:#444;margin-top:3px">Dr. Sarah Benali · RPPS 123456789</div><div style="font-size:11px;color:#666">Av. Habib Bourguiba, Tunis · 71 000 000</div></div>
    <div style="font-family:Syne;font-weight:700;font-size:14px;margin-bottom:8px">ORDONNANCE</div>
    ${pt?`<div style="font-size:12px;margin-bottom:3px"><strong>Patient:</strong> ${pt.prenom} ${pt.nom}</div><div style="font-size:12px;margin-bottom:3px"><strong>Né(e) le:</strong> ${pt.dob}</div>`:''}
    <div style="font-size:11px;color:#666;margin-bottom:14px">Date: ${fmtDate(ord.date)}</div>
    <ul style="list-style:none">${ord.meds.map((m,i)=>`<li style="padding:10px 0;border-bottom:1px solid #eee;font-size:13px"><div><strong>Rp ${i+1}. ${m.nom}</strong></div><div style="color:#444;margin-top:2px">${m.pos}</div><div style="color:#888;font-size:11px">Durée: ${m.dur}</div></li>`).join('')}</ul>
    ${ord.notes?`<div style="margin-top:14px;padding:10px;background:#f5f5f5;border-radius:6px;font-size:12px;color:#444">${ord.notes}</div>`:''}
    <div style="margin-top:28px;display:flex;justify-content:flex-end"><div style="text-align:center"><div style="width:120px;height:1px;background:#1a1a2e;margin:0 auto 5px"></div><div style="font-size:11px;color:#444">Signature & Cachet</div></div></div>
    </div><div class="mf"><button class="btn btn-o" onclick="closeM('m-print')">Fermer</button></div></div>`;
  openM('m-print');
}

// ══════════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════════
function renderNotifs() {
  const list=$('notif-list'); if(!list)return;
  list.innerHTML=NOTIFS.map(n=>`<div style="padding:10px;background:var(--s2);border:1px solid var(--border);border-radius:8px;margin-bottom:7px"><div style="display:flex;gap:9px;align-items:flex-start"><span style="font-size:18px">${n.icon}</span><div><div style="font-size:12px;font-weight:500">${n.title}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">${n.sub}</div></div></div></div>`).join('');
}

</script>
</body>
</html>
